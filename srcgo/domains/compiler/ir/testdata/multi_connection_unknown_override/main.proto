syntax = "proto3";
package ir.mcuo;

import "w17/db.proto";
import "w17/field.proto";

option (w17.db.module) = {
  connection: { name: "main", dialect: POSTGRES, version: "18" }
};

// "ghost" is not declared by any module in this batch — REFUSE with
// a clear diag fix hint.
message Thing {
  option (w17.db.table) = { name: "things", connection: "ghost" };
  int64  id   = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string name = 2 [(w17.field) = { type: CHAR, max_len: 64 }];
}
