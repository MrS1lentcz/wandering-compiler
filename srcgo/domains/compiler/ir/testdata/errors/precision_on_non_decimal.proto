syntax = "proto3";

package ir.precision_on_non_decimal;

import "w17/db.proto";
import "w17/field.proto";

// precision/scale set on a non-DECIMAL field — rejected at
// applyDecimalPrecision. MONEY/PERCENTAGE/RATIO carry their own
// fixed precision; plain NUMBER has no precision dimension.
message X {
  option (w17.db.table) = { name: "xs" };

  int64  id    = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  int64  count = 2 [(w17.field) = { type: NUMBER, precision: 5 }];
}
