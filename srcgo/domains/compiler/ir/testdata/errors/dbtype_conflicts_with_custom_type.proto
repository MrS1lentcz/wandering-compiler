syntax = "proto3";
package irtest.dbtype_conflicts_with_custom_type;
import "w17/db.proto";
import "w17/field.proto";
import "w17/pg/field.proto";

message X {
  option (w17.db.table) = { name: "xs" };
  int64 id = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];

  // Two different storage-override paths set simultaneously — ambiguous,
  // IR rejects with "pick one".
  string data = 2 [
    (w17.field)     = { type: TEXT },
    (w17.db.column) = { db_type: JSONB },
    (w17.pg.field)  = { custom_type: "CITEXT" }
  ];
}
