syntax = "proto3";

package irtest.raw_check_collides_with_derived;

import "w17/db.proto";
import "w17/field.proto";

// Raw-check author name "xs_email_blank" collides with the derived
// constraint name for the email field's blank-synth. Both live in the
// same pg_constraint namespace — IR must reject up front.
message X {
  option (w17.db.table) = {
    name: "xs",
    raw_checks: [
      { name: "xs_email_blank", expr: "length(email) > 0" }
    ]
  };
  int64  id    = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string email = 2 [(w17.field) = { type: EMAIL }];
}
