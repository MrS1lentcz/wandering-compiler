syntax = "proto3";
package irtest;
import "w17/db.proto";
import "w17/field.proto";

enum Color {
  COLOR_UNSPECIFIED = 0;
  RED               = 1;
  BLUE              = 2;
}

// D17 — type: ENUM on a bool carrier is rejected. SEM_ENUM is valid
// only on string / int32 / int64 carriers (carrier × sem table).

message Thing {
  option (w17.db.table) = { name: "things" };
  int64 id    = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  bool  state = 2 [(w17.field) = { type: ENUM, choices: "irtest.Color" }];
}
