syntax = "proto3";
package irtest;
import "w17/db.proto";
import "w17/field.proto";

// D17 — string-carrier type: ENUM without choices: has no enum to
// resolve against (no descriptor handle on the field itself).

message Thing {
  option (w17.db.table) = { name: "things" };
  int64  id    = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string state = 2 [(w17.field) = { type: ENUM }];
}
