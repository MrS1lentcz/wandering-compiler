syntax = "proto3";

package ir.unsupported_carrier_bare_message;

import "w17/db.proto";
import "w17/field.proto";

// Bare message field (non-Timestamp/Duration, not repeated) — rejected
// at protoKindToCarrier. Only google.protobuf.Timestamp and
// google.protobuf.Duration are valid message-shaped carriers in iter-1.
// Exercises describeKind's MessageKind branch.
message Nested {
  string val = 1;
}

message X {
  option (w17.db.table) = { name: "xs" };

  int64  id     = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  Nested inner  = 2;
}
