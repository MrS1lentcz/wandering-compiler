syntax = "proto3";

package ir.decimal_scale_negative;

import "w17/db.proto";
import "w17/field.proto";

// DECIMAL with negative scale — rejected at applyDecimalPrecision.
// Negative scale is meaningless for NUMERIC.
message X {
  option (w17.db.table) = { name: "xs" };

  int64 id  = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string amount = 2 [(w17.field) = { type: DECIMAL, precision: 10, scale: -1 }];
}
