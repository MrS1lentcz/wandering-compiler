syntax = "proto3";

package d19.module_prefix_overflow;

import "w17/db.proto";
import "w17/field.proto";

// D19 error — prefix + table name overflows PG NAMEDATALEN (63 bytes).
// prefix "catalog_commerce_internal_v001" (30) + "_" + table
// "categories_deeply_nested_sub_zeta" (33) = 64 bytes.
option (w17.db.module) = { prefix: "catalog_commerce_internal_v001" };

message CategoryDeeplyNested {
  option (w17.db.table) = { name: "categories_deeply_nested_sub_zeta" };

  int64  id   = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string name = 2 [(w17.field) = { type: CHAR, max_len: 80 }];
}
