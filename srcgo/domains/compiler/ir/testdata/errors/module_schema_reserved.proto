syntax = "proto3";

package d19.module_schema_reserved;

import "w17/db.proto";
import "w17/field.proto";

// D19 error — schema name `pg_catalog` is a reserved PG system schema.
option (w17.db.module) = { schema: "pg_catalog" };

message User {
  option (w17.db.table) = { name: "users" };

  int64  id   = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string name = 2 [(w17.field) = { type: CHAR, max_len: 80 }];
}
