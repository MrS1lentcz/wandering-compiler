syntax = "proto3";

package d23.hash_index_with_sort;

import "w17/db.proto";
import "w17/field.proto";

// D23 error — HASH indexes don't accept sort direction / NULLS.
message User {
  option (w17.db.table) = {
    name: "usersx",
    indexes: [
      { method: HASH,
        fields: [{ name: "handle", desc: true }]
      }
    ]
  };

  int64  id     = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string handle = 2 [(w17.field) = { type: CHAR, max_len: 64 }];
}
