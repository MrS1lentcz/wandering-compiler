syntax = "proto3";
package irtest.dbtype_varchar_needs_max_len;
import "w17/db.proto";
import "w17/field.proto";

message X {
  option (w17.db.table) = { name: "xs" };
  int64 id = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];

  // db_type: VARCHAR requires max_len — IR rejects when missing.
  string data = 2 [(w17.db.column) = { db_type: VARCHAR }];
}
