syntax = "proto3";

package ir.index_name_reserved;

import "w17/db.proto";
import "w17/field.proto";

// Explicit index name equal to a PG reserved keyword — rejected at
// recordIndexName's validateIdentifier branch.
message X {
  option (w17.db.table) = {
    name: "xs",
    indexes: [
      { name: "select", fields: [{ name: "name" }] }
    ]
  };

  int64  id   = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string name = 2 [(w17.field) = { type: CHAR, max_len: 64 }];
}
