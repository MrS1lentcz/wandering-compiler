syntax = "proto3";

package ir.map_value_unsupported;

import "w17/db.proto";
import "w17/field.proto";

// map<string, uint32> — value kind outside the iter-1 carrier set.
// Rejected at populateElement's unsupported-value branch.
message X {
  option (w17.db.table) = { name: "xs" };

  int64 id = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  map<string, uint32> counts = 2;
}
