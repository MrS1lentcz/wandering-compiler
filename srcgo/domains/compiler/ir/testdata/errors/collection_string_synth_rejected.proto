syntax = "proto3";
package irtest.collection_string_synth_rejected;
import "w17/db.proto";
import "w17/field.proto";

message X {
  option (w17.db.table) = { name: "xs" };
  int64 id = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];

  // Per-element string-CHECK options (pattern, blank, choices, min_len)
  // can't be expressed as PG CHECK on array columns — IR must reject
  // so author intent doesn't silently drop.
  repeated string urls = 2 [(w17.field) = { type: URL, pattern: "^x$" }];
}
