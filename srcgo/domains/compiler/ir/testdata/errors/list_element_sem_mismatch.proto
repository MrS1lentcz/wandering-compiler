syntax = "proto3";

package ir.list_element_sem_mismatch;

import "w17/db.proto";
import "w17/field.proto";

// `repeated int64` with `type: URL` — URL sem type requires a string
// element carrier. Rejected at resolveColumnSemType's LIST-element
// validation branch.
message X {
  option (w17.db.table) = { name: "xs" };

  int64 id = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  repeated int64 urls = 2 [(w17.field) = { type: URL }];
}
