syntax = "proto3";

package irtest.pg_override_non_string;

import "w17/db.proto";
import "w17/field.proto";
import "w17/pg/field.proto";
import "w17/pg/project.proto";

option (w17.pg.project) = {
  custom_types: [
    { alias: "numeric_fixed", sql_type: "NUMERIC(30, 10)" }
  ]
};

message X {
  option (w17.db.table) = { name: "xs" };

  int64  id    = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  double price = 2 [
    (w17.field)    = { type: MONEY },
    (w17.pg.field) = { custom_type: "numeric_fixed" }
  ];
}
