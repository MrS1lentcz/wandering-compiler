syntax = "proto3";

package irtest.pg_override_non_string;

import "w17/db.proto";
import "w17/field.proto";
import "w17/pg/field.proto";

message X {
  option (w17.db.table) = { name: "xs" };

  int64  id    = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  double price = 2 [
    (w17.field)    = { type: MONEY },
    (w17.pg.field) = { custom_type: "NUMERIC(30, 10)" }
  ];
}
