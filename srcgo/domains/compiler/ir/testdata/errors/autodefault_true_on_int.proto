syntax = "proto3";

package ir.autodefault_true_on_int;

import "w17/db.proto";
import "w17/field.proto";

// default_auto: TRUE on a non-bool column — rejected at
// validateAutoDefault. TRUE/FALSE only make sense on bool columns.
message X {
  option (w17.db.table) = { name: "xs" };

  int64 id    = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  int64 count = 2 [(w17.field) = { type: NUMBER, default_auto: TRUE }];
}
