syntax = "proto3";

package irtest.index_name_collision;

import "w17/db.proto";
import "w17/field.proto";

// Explicit index hand-named "xs_email_uidx" on `name` field collides
// with the synth'd UNIQUE index from `email`'s `unique: true` — both
// resolve to identifier "xs_email_uidx", which PG rejects at
// `CREATE UNIQUE INDEX … ON xs (email)` with a duplicate-name error.
message X {
  option (w17.db.table) = {
    name: "xs",
    indexes: [
      { name: "xs_email_uidx", fields: ["name"], unique: true }
    ]
  };

  int64  id    = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string name  = 2 [(w17.field) = { type: CHAR, max_len: 64 }];
  string email = 3 [(w17.field) = { type: EMAIL, unique: true }];
}
