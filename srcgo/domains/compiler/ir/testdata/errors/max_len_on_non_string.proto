syntax = "proto3";

package ir.max_len_on_non_string;

import "w17/db.proto";
import "w17/field.proto";

// max_len set on a non-string carrier — rejected at applyMaxLen.
// Numeric/temporal/bool/bytes columns have no length dimension.
message X {
  option (w17.db.table) = { name: "xs" };

  int64 id    = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  int64 count = 2 [(w17.field) = { type: NUMBER, max_len: 10 }];
}
