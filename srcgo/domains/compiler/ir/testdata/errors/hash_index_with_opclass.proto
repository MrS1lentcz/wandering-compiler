syntax = "proto3";

package d23.hash_index_with_opclass;

import "w17/db.proto";
import "w17/field.proto";

// D23 error — HASH indexes don't accept per-field opclass.
message Doc {
  option (w17.db.table) = {
    name: "docs",
    indexes: [
      { method: HASH,
        fields: [{ name: "slug", opclass: "text_pattern_ops" }]
      }
    ]
  };

  int64  id   = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string slug = 2 [(w17.field) = { type: SLUG, max_len: 120 }];
}
