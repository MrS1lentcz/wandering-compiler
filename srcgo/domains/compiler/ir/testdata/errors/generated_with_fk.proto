syntax = "proto3";

package d18.generated_with_fk;

import "w17/db.proto";
import "w17/field.proto";

// D18 error — generated_expr is incompatible with fk on the same column.
message Customer {
  option (w17.db.table) = { name: "customers" };

  int64  id   = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string name = 2 [(w17.field) = { type: CHAR, max_len: 120 }];
}

message Order {
  option (w17.db.table) = { name: "orders" };

  int64 id         = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  int64 primary_id = 2 [(w17.field) = { type: ID }];
  int64 mirror_id  = 3 [
    (w17.field)     = { type: ID },
    (w17.db.column) = {
      fk: "customers.id",
      generated_expr: "primary_id"
    }
  ];
}
