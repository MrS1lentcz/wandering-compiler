syntax = "proto3";
package irtest;
import "w17/db.proto";
import "w17/field.proto";

message Thing {
  option (w17.db.table) = { name: "things" };
  int64 id      = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  // bool must not carry a semantic type
  bool  flagged = 2 [(w17.field) = { type: CHAR }];
}
