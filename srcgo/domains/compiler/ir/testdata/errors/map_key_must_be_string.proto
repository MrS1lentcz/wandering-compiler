syntax = "proto3";
package irtest.map_key_must_be_string;
import "w17/db.proto";
import "w17/field.proto";

message X {
  option (w17.db.table) = { name: "xs" };
  int64 id = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];

  // iter-1.6 restricts map keys to string. Non-string K is rejected
  // because HSTORE (the string-string dispatch) requires string keys
  // and cross-dialect JSONB shape conventions for non-string keys
  // aren't pinned.
  map<int64, string> buckets = 2;
}
