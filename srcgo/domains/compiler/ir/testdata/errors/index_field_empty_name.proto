syntax = "proto3";

package ir.index_field_empty_name;

import "w17/db.proto";
import "w17/field.proto";

// IndexField with name: "" — the entry exists but is unaddressable.
// Distinct from an empty fields list; fires the per-entry empty-name
// branch of validateIndexFieldRefs.
message X {
  option (w17.db.table) = {
    name: "xs",
    indexes: [
      { name: "xs_bad", fields: [{ name: "" }] }
    ]
  };

  int64 id = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
}
