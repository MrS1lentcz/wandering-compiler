syntax = "proto3";
package irtest;
import "w17/db.proto";
import "w17/field.proto";

message Parent {
  option (w17.db.table) = { name: "parents" };
  int64 id = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
}

message Child {
  option (w17.db.table) = { name: "children" };
  int64 id        = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  // deletion_rule: RESET (ON DELETE SET DEFAULT) with no default_* on the
  // column — PG would have nothing to write back into the FK. IR rejects.
  int64 parent_id = 2 [
    (w17.field)     = { type: ID },
    (w17.db.column) = { fk: "parents.id", deletion_rule: RESET }
  ];
}
