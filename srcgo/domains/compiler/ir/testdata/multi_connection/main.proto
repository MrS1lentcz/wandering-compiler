syntax = "proto3";
package ir.mc;

import "w17/db.proto";
import "w17/field.proto";

option (w17.db.module) = {
  connection: { name: "main", dialect: POSTGRES, version: "18" }
};

message User {
  option (w17.db.table) = { name: "users" };
  int64  id    = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string email = 2 [(w17.field) = { type: EMAIL, max_len: 255 }];
}
