syntax = "proto3";
package ir.mc;

import "w17/db.proto";
import "w17/field.proto";

option (w17.db.module) = {
  connection: { name: "sessions", dialect: REDIS, version: "7" }
};

message Session {
  option (w17.db.table) = { name: "sessions" };
  int64  id      = 1 [(w17.field) = { type: ID, pk: true }];
  string payload = 2 [(w17.field) = { type: TEXT }];
}
