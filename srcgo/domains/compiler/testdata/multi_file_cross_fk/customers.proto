syntax = "proto3";

package ir.multi_file_cross_fk;

import "w17/db.proto";
import "w17/field.proto";

// File A — customers table. No module namespace (defaults to public
// on PG). File B (orders.proto) references this table by name.
message Customer {
  option (w17.db.table) = { name: "customers" };

  int64  id    = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string name  = 2 [(w17.field) = { type: CHAR, max_len: 120 }];
  string email = 3 [(w17.field) = { type: EMAIL, max_len: 255, unique: true }];
}
