syntax = "proto3";

package m10.fks_parent_child;

import "w17/db.proto";
import "w17/field.proto";

// Grand-tour fixture: every deletion_rule variant.
//   - CASCADE inferred (rule unspecified, NOT NULL column) — customer_id
//   - ORPHAN via deletion_rule: ORPHAN + null: true (assigned_to)
//   - BLOCK via deletion_rule: BLOCK (auditor_id) — RESTRICT at SQL
//   - RESET via deletion_rule: RESET + default_int (fulfilled_by_id)
//   - Self-referencing FK (Category.parent_id → Category.id, ORPHAN)
//   - Covering INCLUDE index on (customer_id, status) INCLUDE (total),
//     exercises emit/postgres/index.go's INCLUDE branch.
//   - Single-col storage index via (w17.db.column).index on
//     Order.assigned_to, co-existing with the FK — proves the two
//     synth paths compose.
//
// FK-dependency topo sort (plan.diff) is exercised here too: `orders`
// depends on `customers`, so Diff must emit customers before orders.

message Customer {
  option (w17.db.table) = { name: "customers" };

  int64  id   = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string name = 2 [(w17.field) = { type: CHAR, max_len: 120 }];
}

message Order {
  option (w17.db.table) = {
    name: "orders",
    indexes: [
      { fields: [{ name: "customer_id" }, { name: "status" }], include: ["total"] }
    ]
  };

  int64  id               = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  int64  customer_id      = 2 [
    (w17.field)     = { type: ID },
    (w17.db.column) = { fk: "customers.id" }
  ];
  int64  assigned_to      = 3 [
    (w17.field)     = { type: ID, null: true },
    (w17.db.column) = { fk: "customers.id", deletion_rule: ORPHAN, index: true }
  ];
  int64  auditor_id       = 4 [
    (w17.field)     = { type: ID },
    (w17.db.column) = { fk: "customers.id", deletion_rule: BLOCK }
  ];
  int64  fulfilled_by_id  = 5 [
    (w17.field)     = { type: ID, default_int: 0 },
    (w17.db.column) = { fk: "customers.id", deletion_rule: RESET }
  ];
  string status           = 6 [(w17.field) = { type: CHAR, max_len: 16 }];
  double total            = 7 [(w17.field) = { type: MONEY }];
}

message Category {
  option (w17.db.table) = { name: "categories" };

  int64  id        = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  int64  parent_id = 2 [
    (w17.field)     = { type: ID, null: true },
    (w17.db.column) = { fk: "categories.id", deletion_rule: ORPHAN }
  ];
  // Second self-ref FK with BLOCK on a non-null column — pairs with
  // the ORPHAN ref above to exercise self-FK × every deletion_rule.
  int64  root_id   = 3 [
    (w17.field)     = { type: ID },
    (w17.db.column) = { fk: "categories.id", deletion_rule: BLOCK }
  ];
  string name      = 4 [(w17.field) = { type: CHAR, max_len: 80 }];
}
