syntax = "proto3";
package altertest;

import "w17/db.proto";
import "w17/field.proto";

// Moving PK from id (#1) to email (#2) — REFUSE per strategy table.
// PK changes are table-rebuild territory; author writes explicit
// migration.
message User {
  option (w17.db.table) = { name: "users" };

  int64  id    = 1 [(w17.field) = { type: ID, default_auto: IDENTITY }];
  string email = 2 [(w17.field) = { type: EMAIL, max_len: 255, pk: true }];
}
