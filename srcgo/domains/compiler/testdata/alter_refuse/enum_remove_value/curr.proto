syntax = "proto3";
package altertest;

import "w17/db.proto";
import "w17/field.proto";

enum StatusV1 {
  STATUS_V1_UNSPECIFIED = 0;
  DRAFT     = 1;
  PUBLISHED = 2;
  // ARCHIVED removed — REFUSE per D27 strategy table.
}

message Post {
  option (w17.db.table) = { name: "posts" };

  int64  id     = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string status = 2 [(w17.field) = { type: ENUM, choices: "altertest.StatusV1" }];
}
