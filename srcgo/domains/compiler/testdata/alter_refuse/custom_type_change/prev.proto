syntax = "proto3";
package altertest;

import "w17/db.proto";
import "w17/field.proto";
import "w17/pg/field.proto";
import "w17/pg/project.proto";

// D36 — custom_type references must resolve against a registry.
// Register both aliases here so the alter-diff has valid before/after.
option (w17.pg.project) = {
  custom_types: [
    { alias: "my_text_v1", sql_type: "my_text_v1" },
    { alias: "my_text_v2", sql_type: "my_text_v2" }
  ]
};

message Doc {
  option (w17.db.table) = { name: "docs" };

  int64  id      = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string payload = 2 [
    (w17.field)    = { type: TEXT },
    (w17.pg.field) = { custom_type: "my_text_v1" }
  ];
}
