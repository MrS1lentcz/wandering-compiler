syntax = "proto3";

package m8test;

import "w17/db.proto";
import "w17/field.proto";

// Golden: three uniqueness sources on one table — two single-column
// (w17.field).unique synths (email, username) plus one named multi-column
// UNIQUE table-level index (tenant_id, handle). Covers synth ordering,
// derived vs. explicit index names, and reverse DROP INDEX in down.
message User {
  option (w17.db.table) = {
    name: "users",
    indexes: [
      { name: "users_tenant_handle_uidx", fields: ["tenant_id", "handle"], unique: true }
    ]
  };

  int64  id        = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  int64  tenant_id = 2 [(w17.field) = { type: ID }];
  string email     = 3 [(w17.field) = { type: EMAIL, max_len: 255, unique: true }];
  string username  = 4 [(w17.field) = { type: CHAR,  max_len: 32,  unique: true }];
  string handle    = 5 [(w17.field) = { type: SLUG,  max_len: 64 }];
}
