syntax = "proto3";
package altertest;

import "w17/db.proto";
import "w17/field.proto";

message Post {
  option (w17.db.table) = {
    name: "posts",
    raw_indexes: [
      { name: "posts_title_idx", body: "(title)" }
    ]
  };

  int64  id    = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string title = 2 [(w17.field) = { type: CHAR, max_len: 200 }];
}
