syntax = "proto3";
package altertest;

import "w17/db.proto";
import "w17/field.proto";

message Post {
  option (w17.db.table) = {
    name: "posts",
    indexes: [
      { name: "posts_tags_idx", fields: [{ name: "tags" }] }
    ]
  };

  int64  id   = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string tags = 2 [(w17.field) = { type: TEXT }];
}
