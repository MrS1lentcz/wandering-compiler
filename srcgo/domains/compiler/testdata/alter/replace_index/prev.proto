syntax = "proto3";
package altertest;

import "w17/db.proto";
import "w17/field.proto";

message User {
  option (w17.db.table) = {
    name: "users",
    indexes: [
      { fields: [{ name: "email" }], name: "users_email_idx" }
    ]
  };

  int64  id    = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string email = 2 [(w17.field) = { type: EMAIL, max_len: 255 }];
}
