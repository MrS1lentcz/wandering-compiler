syntax = "proto3";
package altertest;

import "w17/db.proto";
import "w17/field.proto";

// Module namespace removed — SCHEMA "reporting" → NONE (public).

message Event {
  option (w17.db.table) = { name: "events" };

  int64  id    = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string label = 2 [(w17.field) = { type: TEXT }];
}
