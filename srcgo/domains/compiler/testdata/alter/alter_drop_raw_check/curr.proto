syntax = "proto3";
package altertest;

import "google/protobuf/timestamp.proto";
import "w17/db.proto";
import "w17/field.proto";

message Order {
  option (w17.db.table) = { name: "orders" };

  int64                     id         = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  google.protobuf.Timestamp start_date = 2 [(w17.field) = { type: DATETIME }];
  google.protobuf.Timestamp end_date   = 3 [(w17.field) = { type: DATETIME }];
}
