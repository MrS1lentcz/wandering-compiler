syntax = "proto3";
package altertest;

import "w17/db.proto";
import "w17/field.proto";

// Multi-axis change on one table: drop phone (#4), add website (#5),
// rename name → display_name (#2 stable), widen email (#3 max_len).
message User {
  option (w17.db.table) = { name: "users" };

  int64  id           = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string display_name = 2 [(w17.field) = { type: CHAR, max_len: 200 }];
  string email        = 3 [(w17.field) = { type: EMAIL, max_len: 320 }];
  string website      = 5 [(w17.field) = { type: URL, max_len: 2048, null: true }];
}
