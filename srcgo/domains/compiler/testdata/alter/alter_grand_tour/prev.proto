syntax = "proto3";
package altertest;

import "google/protobuf/timestamp.proto";
import "w17/db.proto";
import "w17/field.proto";

enum Plan {
  PLAN_UNSPECIFIED = 0;
  FREE = 1;
  PRO  = 2;
}

message Customer {
  option (w17.db.table) = { name: "customers" };

  int64  id    = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string name  = 2 [(w17.field) = { type: CHAR, max_len: 100 }];
  string email = 3 [(w17.field) = { type: EMAIL, max_len: 200 }];
}

message Order {
  option (w17.db.table) = { name: "orders" };

  int64                     id          = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  int64                     customer_id = 2 [
    (w17.field)     = { type: ID },
    (w17.db.column) = { fk: "customers.id" }
  ];
  string                    total       = 3 [(w17.field) = { type: DECIMAL, precision: 10, scale: 2 }];
  google.protobuf.Timestamp created_at  = 4 [(w17.field) = { type: DATETIME, default_auto: NOW }];
}
