syntax = "proto3";
package altertest;

import "google/protobuf/timestamp.proto";
import "w17/db.proto";
import "w17/field.proto";

enum Plan {
  PLAN_UNSPECIFIED = 0;
  FREE = 1;
  PRO  = 2;
  ENTERPRISE = 3;  // new enum value
}

message Address {
  string street = 1;
  string city   = 2;
}

// Customer: email widened + new address field + table comment
message Customer {
  option (w17.db.table) = {
    name: "customers",
    comment: "tenant customers"
  };

  int64   id      = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string  name    = 2 [(w17.field) = { type: CHAR, max_len: 120 }];  // widened 100 → 120
  string  email   = 3 [(w17.field) = { type: EMAIL, max_len: 255, unique: true }];  // widened + unique
  Address address = 4;  // NEW — message field (JSONB)
}

// Order: precision widened + new status enum + renamed "total" → "amount"
message Order {
  option (w17.db.table) = {
    name: "orders",
    indexes: [
      { name: "orders_status_idx", fields: [{ name: "status" }] }
    ]
  };

  int64                     id          = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  int64                     customer_id = 2 [
    (w17.field)     = { type: ID },
    (w17.db.column) = { fk: "customers.id", deletion_rule: BLOCK }  // changed CASCADE → BLOCK
  ];
  string                    amount      = 3 [(w17.field) = { type: DECIMAL, precision: 19, scale: 4 }];  // widened + renamed
  google.protobuf.Timestamp created_at  = 4 [(w17.field) = { type: DATETIME, default_auto: NOW }];
  string                    status      = 5 [(w17.field) = { type: ENUM, choices: "altertest.Plan" }];  // NEW
}
