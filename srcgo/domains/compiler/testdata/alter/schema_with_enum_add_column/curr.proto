syntax = "proto3";
package altertest;

import "w17/db.proto";
import "w17/field.proto";

option (w17.db.module) = { schema: "reporting" };

enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  INFO = 1;
  WARN = 2;
  CRIT = 3;
}

// Exercise SCHEMA-qualified CREATE TYPE + ADD COLUMN — ENUM type
// name qualifies with `reporting.events_severity` prefix.
message Event {
  option (w17.db.table) = { name: "events" };

  int64  id       = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string label    = 2 [(w17.field) = { type: TEXT }];
  string severity = 3 [(w17.field) = { type: ENUM, choices: "altertest.Severity" }];
}
