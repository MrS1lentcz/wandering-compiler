syntax = "proto3";
package altertest;

import "w17/db.proto";
import "w17/field.proto";

// One raw_check replaced (body change), one unchanged, one added.
message Product {
  option (w17.db.table) = {
    name: "products",
    raw_checks: [
      { name: "products_price_positive", expr: "price >= 0.01" },
      { name: "products_stock_nonneg",   expr: "stock >= 0" },
      { name: "products_price_stock_sanity", expr: "price * stock >= 0" }
    ]
  };

  int64  id    = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  double price = 2 [(w17.field) = { type: MONEY }];
  int64  stock = 3 [(w17.field) = { type: COUNTER }];
}
