syntax = "proto3";
package altertest;

import "w17/db.proto";
import "w17/field.proto";

message User {
  option (w17.db.table) = { name: "users" };

  int64  id         = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string first_name = 2 [(w17.field) = { type: CHAR, max_len: 80 }];
  string last_name  = 3 [(w17.field) = { type: CHAR, max_len: 80 }];
  string full_name  = 4 [
    (w17.field)     = { type: CHAR, max_len: 200 },
    (w17.db.column) = { generated_expr: "first_name || ' ' || last_name" }
  ];
}
