syntax = "proto3";
package altertest;

import "w17/db.proto";
import "w17/field.proto";

enum Status {
  STATUS_UNSPECIFIED = 0;
  DRAFT = 1;
  PUBLISHED = 2;
}

message User {
  option (w17.db.table) = { name: "users" };

  int64  id   = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string name = 2 [(w17.field) = { type: CHAR, max_len: 120 }];
}

message Post {
  option (w17.db.table) = { name: "posts" };

  int64  id     = 1 [(w17.field) = { type: ID, pk: true, default_auto: IDENTITY }];
  string status = 2 [(w17.field) = { type: ENUM, choices: "altertest.Status" }];
}
