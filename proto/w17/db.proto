syntax = "proto3";

package w17.db;

import "google/protobuf/descriptor.proto";

option go_package = "github.com/MrS1lentcz/wandering-compiler/srcgo/pb/w17/db;dbpb";

// (w17.db.table) — message-level DB configuration.
//
// Usage:
//   message Product {
//     option (w17.db.table) = {
//       name: "products",
//       indexes: [
//         { fields: ["category_id", "is_active"] }
//       ]
//     };
//     ...
//   }
extend google.protobuf.MessageOptions {
  Table table = 51000;
}

// (w17.db.column) — field-level STORAGE overrides. Data semantics
// (type, constraints, uniqueness, defaults) live on (w17.field).
// (w17.db.column) is reserved for choices that don't affect the data
// contract: storage indexes, column-name overrides for legacy adoption,
// future tablespace / storage parameters.
//
// Usage:
//   string email = 3 [
//     (w17.field)     = { type: EMAIL, unique: true },
//     (w17.db.column) = { index: true, name: "email_address" }
//   ];
extend google.protobuf.FieldOptions {
  Column column = 51002;
}

message Table {
  string name = 1;
  repeated Index indexes = 2;

  // Escape hatches for DB shapes the curated vocabulary can't spell.
  // Both emit dialect-specific SQL verbatim; wc validates identifier
  // names (length, reserved words, collisions) but treats the SQL body
  // as opaque — author is responsible for syntax and apply-time
  // correctness, same contract as (w17.pg.field).custom_type.
  //
  // Use when:
  //  - the built-in CHECK variants (Length / Blank / Range / Regex /
  //    Choices) can't express the constraint — cross-column comparisons,
  //    function calls, computed expressions
  //  - the built-in index shape (btree, fields, INCLUDE) can't express
  //    the index — GIN / GIST / BRIN / HASH, partial indexes (WHERE),
  //    expression indexes (lower(col)), operator classes (gin_trgm_ops)
  repeated RawCheck raw_checks = 3;
  repeated RawIndex raw_indexes = 4;
}

message Index {
  repeated string fields = 1;
  bool unique = 2;

  // Optional name override. Default: auto-derived from table + fields.
  string name = 3;

  // Postgres INCLUDE — covering-index columns. Emitters that don't support
  // INCLUDE must error if non-empty.
  repeated string include = 4;
}

// RawCheck is the escape hatch for CHECK constraints the per-field
// vocabulary can't spell. Author supplies the SQL expression that goes
// inside `CHECK (…)`; wc wraps with `CONSTRAINT <name> CHECK (<expr>)`
// and validates <name> for length / reserved-keyword / collision with
// derived constraint names. The expression itself is opaque — dialect
// portability is the author's problem (same contract as custom_type).
//
// Common uses:
//   { name: "orders_dates_ordered", expr: "start_date <= end_date" }
//   { name: "users_name_or_email",  expr: "name IS NOT NULL OR email IS NOT NULL" }
message RawCheck {
  string name = 1;
  string expr = 2;
}

// RawIndex is the escape hatch for indexes the structured (fields +
// INCLUDE + unique) vocabulary can't spell. Author supplies the body
// AFTER `ON <table>` — i.e. `USING <method> (<cols_or_exprs>) [INCLUDE …]
// [WHERE <cond>]`. wc wraps with `CREATE [UNIQUE] INDEX <name> ON <table>
// <body>` and validates <name> like any other index.
//
// Common uses:
//   { name: "posts_search_gin", body: "USING gin (search_tsv)" }
//   { name: "users_active_email_uidx", unique: true,
//     body: "(email) WHERE deleted_at IS NULL" }
//   { name: "users_lower_email_uidx", unique: true,
//     body: "(lower(email))" }
//   { name: "tags_name_trgm", body: "USING gin (name gin_trgm_ops)" }
//
// Down-migration drops use DROP INDEX IF EXISTS <name>, same as derived
// indexes. Required PG extensions (pg_trgm, btree_gin, …) are the
// author's / operator's responsibility — surface them on
// (w17.pg.field).required_extensions for the hosted platform to
// propagate.
message RawIndex {
  string name = 1;
  bool   unique = 2;
  string body = 3;
}

message Column {
  // Single-field non-unique storage index. Sugar for a single-col entry in
  // (w17.db.table).indexes. Does NOT imply UNIQUE — use (w17.field).unique
  // for uniqueness (data semantic, always represented as a UNIQUE INDEX).
  bool index = 1;

  // SQL column name override. Default = proto field name 1:1. Rare — mostly
  // for adopting existing schemas with non-proto naming conventions.
  string name = 2;
}
