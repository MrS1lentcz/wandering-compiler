syntax = "proto3";

package w17;

import "google/protobuf/descriptor.proto";

option go_package = "github.com/MrS1lentcz/wandering-compiler/srcgo/pb/w17;w17pb";

// Field declares the DB / data semantics of a proto field. Previously split
// across (w17.field) + (w17.validate) — merged 2026-04-20 (the split was
// artificial: max_len appeared on both, CHECK-vs-app enforcement is a target
// concern, not a source concern). See docs/iteration-1.md D7 and
// docs/iteration-1-m1-rev.md.
//
// Usage:
//   string slug = 2 [(w17.field) = { type: SLUG, max_len: 120, unique: true }];
//   double price = 5 [(w17.field) = { type: MONEY, gte: 0 }];
//   google.protobuf.Timestamp created_at = 10
//     [(w17.field) = { type: DATETIME, default_auto: NOW }];
extend google.protobuf.FieldOptions {
  Field field = 51001;
}

message Field {
  // Semantic subtype. Required for every carrier except bool / bytes;
  // for Timestamp must be DATE / TIME / DATETIME; for Duration defaults
  // to INTERVAL.
  Type type = 1;

  // Primary key.
  bool pk = 2;

  // Annotation for future iterations; not enforced in SQL in iter-1.
  bool immutable = 4;

  // Opt-out of NOT NULL. When true the column is nullable AND the generated
  // internal proto emits the field as proto3 `optional`.
  bool null = 5;

  // String-only. When true allows empty string (default CHECK col <> '').
  // Orthogonal to null.
  bool blank = 6;

  // Data-level uniqueness. Renders as UNIQUE INDEX in SQL. Orthogonal to the
  // storage-level (w17.db.column).index flag (which is a pure optimisation).
  bool unique = 7;

  // --- Length bounds (string carriers) ---
  // max_len is required for CHAR and SLUG and drives VARCHAR(N) sizing. For
  // other string types it is an optional upper bound. Counted as Unicode
  // code points (char_length).
  int32 max_len = 8;
  optional int32 min_len = 9;

  // --- Numeric bounds ---
  // gt / lt strict, gte / lte inclusive. Can coexist (e.g. gte + lt).
  // `optional` so 0 vs unset is distinguishable.
  optional double gt  = 10;
  optional double gte = 11;
  optional double lt  = 12;
  optional double lte = 13;

  // --- Pattern override (string carriers) ---
  // Replaces the default regex implied by `type` (e.g. SLUG's `^[a-z0-9-]+$`).
  // Empty string = no override.
  string pattern = 14;

  // --- Enumerated choices (string carriers) ---
  // FQN of a proto enum reachable from this file. The IR builder resolves
  // the path, reads the enum's value names, and emits
  // CHECK (col IN ('VAL1', 'VAL2', …)). Cross-file enum references are
  // permitted — any enum the loader can see is fair game. Empty string =
  // no restriction.
  string choices = 16;

  // --- DECIMAL precision / scale (type: DECIMAL only) ---
  // precision = total number of significant digits (required for DECIMAL).
  // scale     = digits after the decimal point (default 0 — integer-like).
  // IR builder requires 0 < scale <= precision for DECIMAL, and rejects
  // both fields for non-DECIMAL types.
  int32          precision = 17;
  optional int32 scale     = 18;

  // --- Default value at insert time ---
  // Exactly one of the branches may be set. No default_bool: bool defaults
  // go via AutoDefault.TRUE / FALSE for single-channel consistency.
  oneof default {
    string      default_string = 20;
    int64       default_int    = 21;
    double      default_double = 22;
    AutoDefault default_auto   = 23;
  }

  // Field numbers 3 (fk) and 15 (orphanable) have moved to
  // (w17.db.column) — they're DB-specific rules (like indexes /
  // constraints), not data semantics. See D8 rev 2026-04-21 and D12.
  reserved 3, 15;
  reserved "fk", "orphanable";
}

// Type — semantic subtype refining the proto carrier into a SQL column type
// and a default constraint set. Authoritative carrier × Type table is in
// docs/iteration-1.md D2 + the "Preset Bundles" reference. Each Type is a
// preset that carries a cross-dialect storage choice, auto-synthesised
// CHECKs, required/default side-data, and compatibility rules with
// (w17.field).default_* variants.
enum Type {
  TYPE_UNSPECIFIED = 0;

  // String-carrier presets (carrier: string)
  CHAR  = 1;
  TEXT  = 2;
  UUID  = 3;
  EMAIL = 4;   // default max_len 320 (RFC 5321); override via max_len
  URL   = 5;   // default max_len 2048 (modern web practical max); override via max_len
  SLUG  = 6;
  JSON  = 7;   // structured JSON; PG → JSONB, MySQL → JSON, SQLite → TEXT.
               // Also valid on bytes carrier for when the caller holds a []byte.
  IP    = 8;   // IP address (v4/v6); PG → INET, MySQL → VARCHAR(45), SQLite → TEXT
  TSEARCH = 9; // full-text search document; PG → TSVECTOR, MySQL → TEXT + FULLTEXT index (iter-2), SQLite → TEXT + FTS5 (iter-2)

  // Numeric carriers (carrier: int32 / int64 / double — see D2 table)
  NUMBER     = 10;
  ID         = 11;
  COUNTER    = 12;
  MONEY      = 13;
  PERCENTAGE = 14;
  RATIO      = 15;

  // Arbitrary-precision decimal (carrier: string — lossless wire format).
  // Requires (w17.field).precision; (w17.field).scale is optional (default 0).
  // MONEY / PERCENTAGE / RATIO stay as fixed-shape double-carried presets;
  // reach for DECIMAL when you need precision/scale the presets don't cover.
  DECIMAL = 16;

  // Temporal (carrier: google.protobuf.Timestamp)
  DATE     = 20;
  TIME     = 21;
  DATETIME = 22;

  // Duration (carrier: google.protobuf.Duration)
  INTERVAL = 30;

  // Collection carriers (map, repeated). Explicit "compiler picks storage
  // per dialect + element type" — same effect as leaving type unset on
  // a map/repeated field, but written on purpose. For repeated with a
  // scalar element the author can refine to the element's sem type
  // directly (e.g. `repeated string [type: URL]` = array of URLs).
  AUTO = 40;

  // Enumerated value (carrier: string / int32 / int64; also auto-inferred
  // on bare proto-enum fields). Dispatch per carrier:
  //   string  → PG `CREATE TYPE <table>_<col> AS ENUM (names…)` + column
  //             of that type; MySQL `ENUM(...)`; SQLite TEXT + CHECK IN names.
  //   int32/int64 → INTEGER / BIGINT column + CHECK IN (numbers…).
  //   proto-enum field (e.g. `Status s = 1;`) — auto-dispatches to int32
  //             carrier + ENUM sem + choices=FQN derived from the enum.
  // Requires `choices:` on the string-carrier path; on int and proto-enum
  // paths the numbers come from the enum descriptor (names stripped of the
  // *_UNSPECIFIED=0 sentinel per proto3 convention).
  ENUM = 50;
}

// AutoDefault — dynamically resolved default value. Emitters render each
// variant per dialect. IR builder rejects invalid carrier × AutoDefault
// combinations (see D7 table).
enum AutoDefault {
  AUTO_DEFAULT_UNSPECIFIED = 0;

  // Temporal — resolved per Type:
  //   DATE     → CURRENT_DATE
  //   TIME     → CURRENT_TIME
  //   DATETIME → NOW() / CURRENT_TIMESTAMP
  NOW = 1;

  // UUID generation — valid on string carrier with type UUID.
  UUID_V4 = 10;
  UUID_V7 = 11;

  // JSON literals — valid on string carrier (stored as '[]' / '{}') and on
  // JSONB carrier when JSONB lands (iter-2+). Reserved now for shape
  // stability.
  EMPTY_JSON_ARRAY  = 20;
  EMPTY_JSON_OBJECT = 21;

  // Bool — the only way to set a bool default.
  TRUE  = 30;
  FALSE = 31;

  // Auto-incrementing integer PK. Valid on int32 / int64 carrier with
  // type: ID and pk: true. Emitter renders per dialect:
  //   Postgres / Oracle / DB2 / SQL Server 2012+:
  //     GENERATED BY DEFAULT AS IDENTITY (SQL:2003 standard)
  //   MySQL:  AUTO_INCREMENT
  //   SQLite: INTEGER PRIMARY KEY AUTOINCREMENT (rowid-backed)
  IDENTITY = 40;
}
