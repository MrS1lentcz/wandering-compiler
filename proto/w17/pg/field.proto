syntax = "proto3";

package w17.pg;

import "google/protobuf/descriptor.proto";

option go_package = "github.com/MrS1lentcz/wandering-compiler/srcgo/pb/w17/pg;pgpb";

// (w17.pg.field) — Postgres-specific per-field options. Lives in its own
// proto namespace so the core (w17.field) stays dialect-agnostic. The PG
// emitter reads this extension; emitters for other dialects ignore it (or
// error if non-empty flags are set — per-emitter call). See
// docs/iteration-1.md D9 for the dialect-extension pattern.
//
// As of D13 (2026-04-21) the curated jsonb / inet / tsvector flags were
// lifted to core Type values (`type: JSON`, `type: IP`, `type: TSEARCH`)
// because each one has a coherent cross-dialect semantic. hstore stays
// here (PG-only; mapped to HSTORE via AUTO on map<string,string> in
// iter-1.6) alongside the custom_type escape hatch and the extension
// prerequisites list.
//
// Usage:
//   // Escape hatch — pgvector column:
//   string embedding = 6 [
//     (w17.pg.field) = {
//       custom_type: "vector(1536)"
//       required_extensions: ["vector"]
//     }
//   ];
extend google.protobuf.FieldOptions {
  PgField field = 51003;
}

message PgField {
  // --- Escape hatch: raw SQL column type ---
  // When non-empty, this string is used verbatim as the SQL column type and
  // the emitter SKIPS the (w17.field).type dispatch for this column. Use for
  // dialect extensions the vocabulary doesn't cover yet (pgvector, PostGIS
  // geometry, custom DOMAINs, MACADDR, …). All other (w17.field) semantics —
  // `null`, `unique`, bounds, CHECK constraints, defaults — still apply.
  //
  // Mandatory rule: no dialect is allowed to infer column type from
  // `custom_type`. Every dialect namespace ships its own escape hatch.
  string custom_type = 10;

  // --- Extension prerequisites ---
  // Postgres extensions that must exist for this column's type to resolve.
  // The PG emitter surfaces them to the plan; the hosted platform (future)
  // is responsible for `CREATE EXTENSION` pre-apply. For iteration-1 this
  // list is authoring metadata — operators load extensions manually.
  repeated string required_extensions = 11;

  // Field numbers 1 (jsonb), 2 (inet), 3 (tsvector), 4 (hstore) were curated
  // flags that D13 migrated into core Types (JSON / IP / TSEARCH) and the
  // iter-1.6 map-carrier AUTO dispatch (hstore). Reserved to prevent
  // accidental reuse with a different semantic.
  reserved 1, 2, 3, 4;
  reserved "jsonb", "inet", "tsvector", "hstore";
}
