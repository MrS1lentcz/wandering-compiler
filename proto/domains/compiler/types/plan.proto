syntax = "proto3";

package w17.compiler.plan;

import "domains/compiler/types/ir.proto";

option go_package = "github.com/MrS1lentcz/wandering-compiler/srcgo/pb/domains/compiler/types/plan;planpb";

// MigrationPlan is the ordered sequence of Ops produced by the differ from
// two IR schemas (prev, curr). It is the input to per-dialect SQL emitters
// and to sibling consumers — back-compat lint, changelog, visual editor,
// platform UI — each of which reads Ops wire-compat without speaking Go.
// Private / compiler-internal shape (not part of the user-facing w17
// vocabulary); lives under proto/domains/compiler/types/ per tech-spec
// strategic decision #8 and iteration-1.md D4 (rev 2026-04-21).
message MigrationPlan {
  repeated Op ops = 1;
}

// Op is the tagged union over every migration operation. See
// docs/iteration-2.md M1 Design for the full dispatch + ordering rules.
//
// Tag grouping (reserved for future growth):
//   1-9   — table-level ops
//   10-19 — column-level ops
//   20-29 — index ops (structured + raw)
//   30-39 — foreign-key ops
//   40-49 — check-constraint ops (structured + raw)
//   90-99 — applied-state tracking (D27)
message Op {
  oneof variant {
    AddTable            add_table             = 1;
    DropTable           drop_table            = 2;
    RenameTable         rename_table          = 3;
    SetTableNamespace   set_table_namespace   = 4;
    SetTableComment     set_table_comment     = 5;

    AddColumn           add_column            = 10;
    DropColumn          drop_column           = 11;
    RenameColumn        rename_column         = 12;
    AlterColumn         alter_column          = 13;

    AddIndex            add_index             = 20;
    DropIndex           drop_index            = 21;
    ReplaceIndex        replace_index         = 22;
    AddRawIndex         add_raw_index         = 23;
    DropRawIndex        drop_raw_index        = 24;
    ReplaceRawIndex     replace_raw_index     = 25;

    AddForeignKey       add_foreign_key       = 30;
    DropForeignKey      drop_foreign_key      = 31;
    ReplaceForeignKey   replace_foreign_key   = 32;

    AddCheck            add_check             = 40;
    DropCheck           drop_check            = 41;
    ReplaceCheck        replace_check         = 42;
    AddRawCheck         add_raw_check         = 43;
    DropRawCheck        drop_raw_check        = 44;
    ReplaceRawCheck     replace_raw_check     = 45;

    WcMigrationsCreate  wc_migrations_create  = 90;
    WcMigrationsInsert  wc_migrations_insert  = 91;
  }
}

// TableCtx bundles the table-qualifier facts the emitter needs to
// produce fully-qualified DDL. Every column-level / index / FK / check
// op carries one so emit stays Op-local — no consulting a sibling
// Schema or Table at emit time.
message TableCtx {
  string message_fqn = 1;
  string table_name = 2;
  w17.compiler.ir.NamespaceMode namespace_mode = 3;
  string namespace = 4;
}

// --- Table-level ops -------------------------------------------------------

// AddTable creates a new table. Carries the full ir.Table so the emitter
// reaches columns, indexes, FKs, PK list, raw_* entries, and comments from
// one place. Down emits DROP TABLE plus any dependent object drops (enum
// types, indexes) per the iter-1 emitAddTable path.
message AddTable {
  w17.compiler.ir.Table table = 1;
}

// DropTable removes a table. Carries the full prev-side Table so the
// down-migration can recreate it faithfully (same shape as AddTable but
// reversed). FK-dependency order is the differ's concern (reverse topo);
// the emitter just renders the DROP.
message DropTable {
  w17.compiler.ir.Table table = 1;
}

// RenameTable — message FQN stable, (w17.db.table).name changed. Carries
// both old + new Table so the emitter qualifies both sides. Uses ALTER
// TABLE ... RENAME TO on PG (data-preserving).
message RenameTable {
  TableCtx ctx = 1;                       // post-rename context (new name)
  string   from_name = 2;                 // pre-rename SQL name
  string   to_name = 3;                   // post-rename SQL name
}

// SetTableNamespace — message FQN stable, (w17.db.module).namespace or
// mode changed. Emitter strategy per iteration-2.md alter-strategies
// table (SCHEMA↔SCHEMA = SET SCHEMA, PREFIX↔PREFIX = RENAME TO with new
// prefix, cross-mode = rename + SET SCHEMA chain).
message SetTableNamespace {
  string message_fqn = 1;
  string table_name_from = 2;             // before move (PREFIX bakes prefix in)
  string table_name_to = 3;               // after move
  w17.compiler.ir.NamespaceMode from_mode = 4;
  string from_namespace = 5;
  w17.compiler.ir.NamespaceMode to_mode = 6;
  string to_namespace = 7;
}

// SetTableComment — COMMENT ON TABLE add / change / drop. Empty to = drop.
message SetTableComment {
  TableCtx ctx = 1;
  string from = 2;
  string to = 3;
}

// --- Column-level ops ------------------------------------------------------

// AddColumn adds a column to an existing table. The full ir.Column is
// carried so the emitter can render default / NOT NULL / generated_expr /
// comment / CHECK constraints inline. Down emits DROP COLUMN.
message AddColumn {
  TableCtx ctx = 1;
  w17.compiler.ir.Column column = 2;
}

// DropColumn removes a column. Carries the pre-state Column so down can
// re-add with the original shape.
message DropColumn {
  TableCtx ctx = 1;
  w17.compiler.ir.Column column = 2;
}

// RenameColumn — proto field number stable, name changed. Down swaps
// from/to. ALTER TABLE ... RENAME COLUMN on every supported dialect.
message RenameColumn {
  TableCtx ctx = 1;
  int32  field_number = 2;
  string from_name = 3;
  string to_name = 4;
}

// AlterColumn consolidates every in-place fact change on one column into
// one op. The emitter walks `changes` and picks the per-fact strategy
// (DIRECT / USING / DROP+ADD / REFUSE) per iteration-2.md. Multiple
// changes on one column coalesce into one ALTER TABLE statement where PG
// permits.
message AlterColumn {
  TableCtx ctx = 1;
  int32  field_number = 2;
  string column_name = 3;
  repeated FactChange changes = 4;
  // Post-change Column state. Emitter consults when a FactChange
  // needs the rendered column type (e.g. GeneratedExpr add → the
  // `ADD COLUMN` needs the type before GENERATED ALWAYS AS; DbType
  // transitions when prev was UNSPECIFIED → derive the effective
  // type via columnType(column)).
  w17.compiler.ir.Column column = 5;
  // Pre-change Column state — symmetric counterpart for down SQL.
  w17.compiler.ir.Column prev_column = 6;
}

// FactChange is the per-fact delta inside an AlterColumn. Each variant
// carries `from` + `to` so the emitter can render both up (to) and down
// (from) with the same dispatch. REFUSE-strategy facts (carrier, pk,
// storage_index, custom_type, element_*) are caught at diff time with
// a diag.Error — they never reach emit.
message FactChange {
  oneof variant {
    NullableChange           nullable            = 1;
    DefaultChange            default_value       = 2;
    MaxLenChange             max_len             = 3;
    NumericPrecisionChange   numeric_precision   = 4;
    DbTypeChange             db_type             = 5;
    PgOptionsChange          pg_options          = 6;
    CommentChange            comment             = 7;
    GeneratedExprChange      generated_expr      = 8;
    ChecksChange             checks              = 9;
    EnumValuesChange         enum_values         = 10;
    AllowedExtensionsChange  allowed_extensions  = 11;
    UniqueChange             unique              = 12;
    // D33 — cross-carrier type change, synthesised by engine.Plan
    // from a resolved ReviewFinding. Carries the pre-rendered PG
    // type strings + optional USING expressions (templated from
    // classifier.yaml `using:` entries). Distinct from DbTypeChange
    // because the latter operates within a single carrier family
    // (VARCHAR↔TEXT); cross-carrier changes (BOOL→STRING,
    // INT32→INT64, …) need the USING clause explicit rather than
    // synthesised by cast-keyword heuristics.
    TypeChange               type_change         = 13;
  }
}

message NullableChange        { bool from = 1; bool to = 2; }
message DefaultChange         { w17.compiler.ir.Default from = 1; w17.compiler.ir.Default to = 2; }
message MaxLenChange          { int32 from = 1; int32 to = 2; }
message NumericPrecisionChange {
  int32 from_precision = 1;
  optional int32 from_scale = 2;
  int32 to_precision = 3;
  optional int32 to_scale = 4;
}
message DbTypeChange          { w17.compiler.ir.DbType from = 1; w17.compiler.ir.DbType to = 2; }
message PgOptionsChange       { w17.compiler.ir.PgOptions from = 1; w17.compiler.ir.PgOptions to = 2; }
message CommentChange         { string from = 1; string to = 2; }
message GeneratedExprChange   { string from = 1; string to = 2; }
message UniqueChange          { bool from = 1; bool to = 2; }

// TypeChange — D33 cross-carrier ALTER TABLE ... ALTER COLUMN ...
// TYPE shape. Carries the IR Column snapshots (prev = from_column,
// curr = to_column) so the emitter renders dialect-specific column
// types via its normal dispatch — no leaking of dialect keyword
// knowledge into the engine.
//
// using_up / using_down are rendered by the engine from the
// classifier's `using:` template with `{Col, Table, FromType,
// ToType}` context:
//
//   - strategy = LOSSLESS_USING → using_up set from the cell's
//     template (e.g. "{{.Col}}::text" → "target::text").
//   - strategy = NEEDS_CONFIRM → using_up set; check.sql emitted in
//     parallel by engine.collectChecks.
//   - strategy = SAFE → using_up empty; emitter omits USING and PG
//     performs an implicit cast (guaranteed compatible by cell).
//   - using_down is the reverse direction's USING clause. Engine
//     renders the symmetric cell's `using:` if available, else
//     falls back to `{{.Col}}::{{.FromType}}`.
//
// DROP_AND_CREATE doesn't use TypeChange — engine emits a
// DropColumn+AddColumn pair instead. CUSTOM_MIGRATION doesn't use
// TypeChange — engine splices the user SQL at string level.
message TypeChange {
  w17.compiler.ir.Column from_column = 1;  // prev Column snapshot
  w17.compiler.ir.Column to_column = 2;    // curr Column snapshot
  string using_up = 3;
  string using_down = 4;
  Strategy strategy = 5;
}

// ChecksChange carries added + removed Check entries (keyed by their
// resolved SQL constraint name). Emitter expands to DROP CONSTRAINT /
// ADD CONSTRAINT pairs in deterministic order.
message ChecksChange {
  repeated w17.compiler.ir.Check added = 1;
  repeated w17.compiler.ir.Check removed = 2;
}

// EnumValuesChange covers the PG `ALTER TYPE ADD VALUE` path (added
// values) and the REFUSE path (removed values — PG can't drop them).
// The differ only produces this variant with `added_names` non-empty;
// removed values become a diag.Error at diff time.
message EnumValuesChange {
  repeated string added_names = 1;
  repeated int64 added_numbers = 2;
}

message AllowedExtensionsChange {
  repeated string from = 1;
  repeated string to = 2;
}

// --- Index ops -------------------------------------------------------------

// `columns` carries the carrier table's column snapshot so the
// emitter can resolve IndexField proto-name references to SQL
// column names (and look up `(w17.db.column).name` overrides)
// without consulting Schema. Same convention for FK ops below.
message AddIndex {
  TableCtx ctx = 1;
  w17.compiler.ir.Index index = 2;
  repeated w17.compiler.ir.Column columns = 3;
}
message DropIndex {
  TableCtx ctx = 1;
  w17.compiler.ir.Index index = 2;        // pre-state, used by down to recreate
  repeated w17.compiler.ir.Column columns = 3;
}
message ReplaceIndex {
  TableCtx ctx = 1;
  w17.compiler.ir.Index from = 2;
  w17.compiler.ir.Index to = 3;
  repeated w17.compiler.ir.Column columns = 4;
}

// raw_index ops carry an opaque body that already references columns
// by SQL name (author's problem); no column snapshot needed.
message AddRawIndex     { TableCtx ctx = 1; w17.compiler.ir.RawIndex index = 2; }
message DropRawIndex    { TableCtx ctx = 1; w17.compiler.ir.RawIndex index = 2; }
message ReplaceRawIndex { TableCtx ctx = 1; w17.compiler.ir.RawIndex from = 2; w17.compiler.ir.RawIndex to = 3; }

// --- FK ops ----------------------------------------------------------------

message AddForeignKey {
  TableCtx ctx = 1;
  w17.compiler.ir.ForeignKey fk = 2;
  string constraint_name = 3;
  repeated w17.compiler.ir.Column columns = 4;
}
message DropForeignKey {
  TableCtx ctx = 1;
  w17.compiler.ir.ForeignKey fk = 2;
  string constraint_name = 3;
  repeated w17.compiler.ir.Column columns = 4;
}
message ReplaceForeignKey {
  TableCtx ctx = 1;
  w17.compiler.ir.ForeignKey from = 2;
  w17.compiler.ir.ForeignKey to = 3;
  string constraint_name = 4;
  repeated w17.compiler.ir.Column columns = 5;
}

// --- CHECK ops -------------------------------------------------------------

// CHECK ops carry the owning Column directly (renderCheck signature
// already takes a single Column).
message AddCheck     { TableCtx ctx = 1; w17.compiler.ir.Column column = 2; w17.compiler.ir.Check check = 3; }
message DropCheck    { TableCtx ctx = 1; w17.compiler.ir.Column column = 2; w17.compiler.ir.Check check = 3; }
message ReplaceCheck { TableCtx ctx = 1; w17.compiler.ir.Column column = 2; w17.compiler.ir.Check from = 3; w17.compiler.ir.Check to = 4; }

message AddRawCheck     { TableCtx ctx = 1; w17.compiler.ir.RawCheck check = 2; }
message DropRawCheck    { TableCtx ctx = 1; w17.compiler.ir.RawCheck check = 2; }
message ReplaceRawCheck { TableCtx ctx = 1; w17.compiler.ir.RawCheck from = 2; w17.compiler.ir.RawCheck to = 3; }

// --- Applied-state tracking (D27) ------------------------------------------

// WcMigrationsCreate — emitted in the very first migration for a
// (domain, connection). Creates `wc_migrations` in the connection's
// default schema. No namespace qualifier needed (one table per DB;
// D26 pins "one domain = one DB" so no collision risk).
message WcMigrationsCreate {}

// WcMigrationsInsert — emitted at the tail of every up.sql; matching
// DELETE goes at the head of down.sql. Timestamp = the migration's D5
// filename stem (e.g. "20260423T143015Z"). content_sha256 = sha256 of
// the up.sql body computed AFTER the rest is finalised (the INSERT
// statement is the final line; the hash covers everything before it).
message WcMigrationsInsert {
  string timestamp = 1;
  bytes  content_sha256 = 2;
}

// --- D30 — Engine envelope -------------------------------------------------
//
// Plan is the top-level return of the pure engine function
//
//     func Plan(prev, curr *ir.Schema, resolutions []Resolution) (*Plan, error)
//
// It wraps the artifacts the engine produces (one Migration per target
// Connection) plus any decisions the engine couldn't auto-resolve
// (ReviewFindings, matched to Resolutions by deterministic ID).
//
// Storage, approval workflows, resolution delivery — all sit outside
// this envelope in Sink + ResolutionSource adapters per D30.
message Plan {
  repeated Migration migrations = 1;
  repeated ReviewFinding findings = 2;
}

// Migration — everything the compiler produces for one Connection on
// one `wc generate` run. Down-stream Sinks serialise whichever subset
// they want (SQL files, manifest JSON, check files, registry push).
message Migration {
  w17.compiler.ir.Connection connection = 1;
  // Ops — structured intermediate; the diff output MigrationPlan.
  MigrationPlan plan = 2;
  // up_sql / down_sql — final rendered SQL for this migration pair.
  // Empty for connections where the diff was a no-op (AC #1: no files
  // written when prev == curr; Sink gets the signal via empty strings).
  string up_sql = 3;
  string down_sql = 4;
  // Checks — pre-apply validation queries, one per NEEDS_CONFIRM cell
  // the classifier emitted. Each links back to its ReviewFinding.
  repeated NamedSQL checks = 5;
  Manifest manifest = 6;
}

// NamedSQL — a check.sql body with a stable identifier + finding
// back-reference. Sink decides file naming / location; engine just
// provides the strings.
message NamedSQL {
  string name = 1;                  // e.g. "check_users_email_not_null"
  string sql = 2;
  string finding_id = 3;            // links to ReviewFinding that produced it
  string rationale = 4;             // human-readable "what this guards against"
}

// Manifest — M4 deliverable surfaced early in the envelope. Lists the
// capabilities this migration used (D16 catalog IDs), required PG
// extensions, and the resolutions applied during this run.
message Manifest {
  repeated string required_extensions = 1;       // CREATE EXTENSION prerequisites
  repeated string capabilities = 2;              // D16 cap IDs touched
  repeated AppliedResolution applied_resolutions = 3;
}

// AppliedResolution — the subset of input resolutions that matched a
// finding in this run. Embedded in the manifest so deploy-time auditors
// can reconstruct the decision history without re-consulting the CLI
// flag stream or platform API.
message AppliedResolution {
  string finding_id = 1;
  Strategy strategy = 2;
  string actor = 3;
  int64  decided_at_unix = 4;
  string custom_sql = 5;            // populated when strategy == CUSTOM_MIGRATION
}

// ReviewFinding — a decision point the classifier can't auto-resolve.
// Emitted by the engine whenever a FactChange lands in a strategy the
// rule says requires user opt-in (DROP_AND_CREATE / CUSTOM_MIGRATION
// by default; NEEDS_CONFIRM when classifier can't synthesise a clean
// check.sql).
//
// ID is a deterministic hash of (column fqn, axis, prev fact snapshot,
// curr fact snapshot) — same inputs → same ID → resolutions survive
// re-runs idempotently.
message ReviewFinding {
  string id = 1;
  ColumnRef column = 2;
  string axis = 3;                  // D28 axis identifier (e.g. "carrier_change")
  Strategy proposed = 4;            // classifier default
  repeated Strategy options = 5;    // set --decide can pick from (always includes proposed)
  string rationale = 6;             // why compiler won't auto
  FindingContext context = 7;
  Severity severity = 8;
}

// ColumnRef — where in the schema the finding anchors. Uses proto
// identity (MessageFqn + field number) per D10 so IDs stay stable
// across renames.
message ColumnRef {
  string table_fqn = 1;             // proto MessageFqn (iter-2 D24 table identity)
  string table_name = 2;            // SQL-qualified name at curr time
  int32  field_number = 3;
  string column_name = 4;           // SQL column name at curr time (post-rename)
}

// FindingContext — the prev + curr snapshots that make the finding
// reviewable. `oneof kind` dispatches per axis family so the payload
// matches the decision shape (column-axis alterations carry
// ColumnContext, FK-add carries FKContext, etc.).
message FindingContext {
  oneof kind {
    ColumnContext column  = 1;
    FKContext     fk      = 2;
    CheckContext  check   = 3;
    IndexContext  index   = 4;
    TableContext  table   = 5;
  }
  // Human-readable one-liners for UI / CLI printing. Derived
  // deterministically from the context — not independently set.
  string prev_summary = 10;
  string curr_summary = 11;
}

message ColumnContext { w17.compiler.ir.Column     prev = 1; w17.compiler.ir.Column     curr = 2; }
message FKContext     { w17.compiler.ir.ForeignKey prev = 1; w17.compiler.ir.ForeignKey curr = 2; }
message CheckContext  { w17.compiler.ir.Check      prev = 1; w17.compiler.ir.Check      curr = 2; }
message IndexContext  { w17.compiler.ir.Index      prev = 1; w17.compiler.ir.Index      curr = 2; }
message TableContext  { w17.compiler.ir.Table      prev = 1; w17.compiler.ir.Table      curr = 2; }

// Resolution — a caller's decision on a ReviewFinding. Supplied to
// `Plan()` via a ResolutionSource adapter (CLI flags, file, platform
// API, test map). The engine never reads these directly from I/O —
// they're passed as the third argument.
message Resolution {
  string    finding_id = 1;
  Strategy  strategy = 2;
  // When strategy == CUSTOM_MIGRATION: the author's SQL. Wrapped by
  // the engine in a managed transaction at emit time; engine never
  // persists the SQL itself (see D30 + D29 — custom SQL stays in
  // CLI input or platform UI, never in git).
  string    custom_sql = 3;
  // Audit trail. Populated by the ResolutionSource (who decided, when).
  string    actor = 4;
  int64     decided_at_unix = 5;
}

// Strategy — the five D28 classification outcomes. Ordering matches
// strictness rank for the multi-axis fold (strictest wins):
//   SAFE < LOSSLESS_USING < NEEDS_CONFIRM < DROP_AND_CREATE < CUSTOM_MIGRATION
enum Strategy {
  STRATEGY_UNSPECIFIED = 0;
  SAFE                 = 1;
  LOSSLESS_USING       = 2;
  NEEDS_CONFIRM        = 3;
  DROP_AND_CREATE      = 4;
  CUSTOM_MIGRATION     = 5;
}

// Severity — how much a ReviewFinding blocks downstream processing.
// Engine sets per axis; caller policy (CLI / platform) decides what
// to do. Today's main use: proto wire-compat warnings on carrier
// change ship as `WARNING` not `BLOCK` (D28 Q2 lean — warn, don't
// force).
enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  // INFO    — just FYI; migration proceeds regardless.
  INFO                 = 1;
  // WARNING — surface loudly; migration proceeds if resolved.
  WARNING              = 2;
  // BLOCK   — migration MUST NOT emit SQL until a matching Resolution
  //           lands. Default for DROP_AND_CREATE / CUSTOM_MIGRATION.
  BLOCK                = 3;
}
