syntax = "proto3";

package w17.compiler.ir;

option go_package = "github.com/MrS1lentcz/wandering-compiler/srcgo/pb/domains/compiler/types/ir;irpb";

// Compiler-internal IR. Produced by srcgo/domains/compiler/ir.Build, consumed
// by the differ (plan), SQL emitters, and later sibling tools (back-compat
// lint, changelog, visual editor). Private shape — not part of the user-
// facing w17 vocabulary, lives under proto/domains/compiler/types/ per
// tech-spec strategic decision #8 (proto, not Go structs) and
// iteration-1.md D4 rev 2026-04-21.
//
// SourceLocation replaces live protoreflect.FieldDescriptor handles that
// the first cut of this IR stored as Go fields; descriptors aren't
// serializable and the IR must cross processes/languages.

// Schema is a validated authoring input ready for the differ and emitters.
message Schema {
  repeated Table tables = 1;

  // Module-level namespace (D19). Populated from (w17.db.module).
  // `namespace_mode` + `namespace` together describe how emitters
  // qualify every table / index / FK / DROP in this schema. Empty
  // `namespace` with NAMESPACE_MODE_NONE = bare names + default
  // dialect schema.
  NamespaceMode namespace_mode = 2;
  string namespace = 3;
}

// NamespaceMode — which strategy the module picked (D19). Mirrors the
// oneof in (w17.db.module) 1:1; kept as an IR enum so consumers don't
// import the authoring vocabulary. NONE = module option unset.
enum NamespaceMode {
  NAMESPACE_MODE_NONE = 0;
  NAMESPACE_MODE_SCHEMA = 1;    // PG schema qualification: <namespace>.<table>
  NAMESPACE_MODE_PREFIX = 2;    // name prefixing: <namespace>_<table>
}

// SourceLocation anchors an IR node to its originating position in the
// source .proto. Populated from
// protoreflect.FileDescriptor.SourceLocations().ByDescriptor(d) at build
// time. Line / col are 1-based, 0 means "unknown" (source info missing).
message SourceLocation {
  string file = 1;
  int32 line = 2;
  int32 col  = 3;
}

message Table {
  string name = 1;                     // SQL table name
  string message_fqn = 2;              // FQN of the source proto message
  SourceLocation location = 3;
  repeated Column columns = 4;
  repeated Index indexes = 5;
  repeated ForeignKey foreign_keys = 6;
  // proto_name of each PK column, in declaration order. Derived view over
  // Columns with pk=true, kept explicit so consumers don't re-walk the list.
  repeated string primary_key = 7;

  // Escape-hatch CHECK / INDEX bodies from (w17.db.table).raw_checks /
  // .raw_indexes. Carry the opaque SQL body verbatim; name is validated
  // like any other identifier. See proto/w17/db.proto for the author
  // contract.
  repeated RawCheck raw_checks = 8;
  repeated RawIndex raw_indexes = 9;

  // Module namespace (D19). Copied onto every Table from Schema so
  // emitters see the information Op-local (plan Ops only carry Table,
  // not Schema). PREFIX mode: Table.Name is already prefixed in IR
  // (derived index / check / enum-type names inherit); emitter uses
  // Name as-is. SCHEMA mode: Table.Name is bare; emitter qualifies
  // <namespace>.<Name> at every identifier emission site. NONE:
  // bare everywhere.
  NamespaceMode namespace_mode = 10;
  string namespace = 11;
}

message RawCheck {
  string name = 1;   // constraint identifier (validated)
  string expr = 2;   // opaque — body between `CHECK (…)`
}

message RawIndex {
  string name = 1;   // index identifier (validated; collision-checked vs. derived + explicit Index names)
  bool   unique = 2;
  string body = 3;   // opaque — everything after `ON <table>`
}

message Column {
  string name = 1;        // SQL column name (after (w17.db.column).name override)
  string proto_name = 2;  // original proto field name (for indexes / FK refs)
  SourceLocation location = 3;

  Carrier carrier = 10;
  SemType type = 11;
  bool nullable = 12;
  bool pk = 13;
  bool unique = 14;        // data-level (UNIQUE INDEX)
  bool immutable = 15;     // recorded for future iterations; not emitted in iter-1
  // Sugar for a single-col entry in Table.indexes. Does NOT imply unique.
  bool storage_index = 16;

  // Size-driving fields. Retained on Column (not folded into LengthCheck)
  // because emitters pick the column DDL type from these before any CHECK.
  int32 max_len = 20;
  int32 precision = 21;
  optional int32 scale = 22;

  // Default value at INSERT. Unset = no default.
  Default default = 30;
  // Postgres dialect passthrough (custom_type + required_extensions).
  PgOptions pg = 31;
  // Storage type override from (w17.db.column).db_type. Unset =
  // field.Type preset picks storage; set = enumerated storage wins
  // over preset. See D14.
  DbType db_type = 32;

  // --- Collection carriers (CARRIER_MAP / CARRIER_LIST) ---
  // For Carrier=CARRIER_LIST: element's underlying Carrier (the scalar
  // kind of a `repeated X` field). For Carrier=CARRIER_MAP: V's Carrier
  // (K is always string in iter-1.6).
  // CARRIER_UNSPECIFIED when the element / value is a proto Message
  // (element_is_message=true) — forces JSON storage.
  Carrier element_carrier = 33;
  // True when the element / map-value is a proto Message type
  // (repeated Foo, map<string, Foo>). Forces JSON storage regardless
  // of dialect.
  bool element_is_message = 34;

  // --- SEM_ENUM side-data (D17) ---
  // FQN of the proto enum providing the values, populated whenever
  // Type == SEM_ENUM. enum_names / enum_numbers hold the non-sentinel
  // values in proto declaration order (the *_UNSPECIFIED=0 entry
  // stripped per proto3 convention).
  //   string+SEM_ENUM path (PG ENUM storage): emitter uses enum_names
  //     to emit CREATE TYPE <table>_<col> AS ENUM (names…).
  //   int+SEM_ENUM path:                      attachChecks synths a
  //     ChoicesCheck with numbers populated; enum_names stays for
  //     --verbose / admin-gen use.
  string enum_fqn = 35;
  repeated string enum_names = 36;
  repeated int64 enum_numbers = 37;

  // Opaque SQL expression from (w17.db.column).generated_expr (D18).
  // When non-empty the column emits as
  // `GENERATED ALWAYS AS (<expr>) STORED` — wc treats the body as
  // opaque (same contract as RawCheck.expr / RawIndex.body). IR-time
  // validation in ir.Build enforces the incompatible-field set
  // (default / pk / fk) before the expression is carried forward.
  string generated_expr = 38;

  repeated Check checks = 40;
}

// PgOptions mirrors (w17.pg.field). Curated jsonb / inet / tsvector / hstore
// flags that used to live here were lifted to core Types in D13 (or to the
// map-carrier AUTO dispatch for hstore). custom_type + required_extensions
// remain as the escape hatch + extension manifest. Field numbers reserved
// for historical continuity.
message PgOptions {
  reserved 1, 2, 3, 4;
  reserved "jsonb", "inet", "tsvector", "hstore";

  string custom_type = 10;
  repeated string required_extensions = 11;
}

message Index {
  string name = 1;              // auto-derived by the naming package when empty
  repeated string fields = 2;
  bool unique = 3;
  repeated string include = 4;  // Postgres INCLUDE — covering-index columns
}

// ForeignKey references its owning column by proto_name (not by pointer, so
// the IR is wire-safe). Emitters resolve the column within the table.
message ForeignKey {
  string column = 1;
  string target_table = 2;
  string target_column = 3;
  FKAction on_delete = 4;
}

// Default is the tagged union over the (w17.field).default oneof.
message Default {
  oneof variant {
    AutoKind auto           = 1;
    string   literal_string = 2;
    int64    literal_int    = 3;
    double   literal_double = 4;
  }
}

// Check is a column-level CHECK constraint. Variants cover the validation
// surface from (w17.field) minus the facts that resolve into column
// type/modifiers (pk, null, unique, max_len on CHAR/SLUG, precision/scale
// on DECIMAL).
message Check {
  oneof variant {
    LengthCheck  length  = 1;
    BlankCheck   blank   = 2;
    RangeCheck   range   = 3;
    RegexCheck   regex   = 4;
    ChoicesCheck choices = 5;
  }
}

// LengthCheck — char_length bounds on string carriers whose column type
// doesn't already enforce them. For CHAR/SLUG, VARCHAR(N) sizing covers the
// upper bound and no LengthCheck is added for the max. min always renders
// as a CHECK when set.
message LengthCheck {
  optional int32 min = 1;
  optional int32 max = 2;
}

// BlankCheck — the implicit `col <> ''` on string carriers. Absent when the
// author opted into (w17.field).blank = true, or when the column is nullable.
message BlankCheck {}

// RangeCheck — numeric bounds. Optional to distinguish 0 from unset.
message RangeCheck {
  optional double gt  = 1;
  optional double gte = 2;
  optional double lt  = 3;
  optional double lte = 4;
}

// RegexCheck — author-supplied pattern OR the default pattern implied by
// type (SLUG, UUID, EMAIL, URL).
message RegexCheck {
  string pattern = 1;
  RegexSource source = 2;
}

// ChoicesCheck — resolved proto enum values for (w17.field).choices on
// string carriers (CHECK IN ('A','B',…)), OR the numeric CHECK IN (1,2,…)
// path for int + SEM_ENUM columns. Exactly one of `values` / `numbers`
// is populated per instance; the emitter dispatches on whichever is set.
message ChoicesCheck {
  string enum_fqn = 1;
  // String-name CHECK IN — used for string-carrier `choices:` option.
  repeated string values = 2;
  // Int-number CHECK IN — used for int-carrier SEM_ENUM (D17).
  repeated int64 numbers = 3;
}

// Carrier is the proto wire-type underneath a field.
enum Carrier {
  CARRIER_UNSPECIFIED = 0;
  CARRIER_BOOL = 1;
  CARRIER_STRING = 2;
  CARRIER_INT32 = 3;
  CARRIER_INT64 = 4;
  CARRIER_DOUBLE = 5;
  CARRIER_TIMESTAMP = 6;
  CARRIER_DURATION = 7;
  // Raw binary blob. Proto `bytes` carrier → PG BYTEA / MySQL BLOB /
  // SQLite BLOB. Like bool, carries no semantic subtype.
  CARRIER_BYTES = 8;
  // Proto map<K, V>. Dispatch: PG → HSTORE for map<string, string>,
  // else JSONB; MySQL → JSON; SQLite → TEXT. V may be a scalar or a
  // proto message. Iter-1.6 restricts K to string.
  CARRIER_MAP = 9;
  // Proto `repeated X`. Dispatch: PG → native array of element's PG
  // type when the element is a scalar; JSONB when the element is a
  // proto message. MySQL → JSON; SQLite → TEXT.
  // For repeated scalars, (w17.field).type on the field refines the
  // ELEMENT's sem type (e.g. `repeated string [type: URL]`).
  CARRIER_LIST = 10;
}

// SemType is the semantic refinement of a Carrier.
enum SemType {
  SEM_UNSPECIFIED = 0;

  // String carriers.
  SEM_CHAR = 1;
  SEM_TEXT = 2;
  SEM_UUID = 3;
  SEM_EMAIL = 4;
  SEM_URL = 5;
  SEM_SLUG = 6;
  // String or bytes carrier (proto both encode JSON as opaque payload).
  // Storage: PG JSONB, MySQL JSON, SQLite TEXT.
  SEM_JSON = 7;
  // String carrier. Storage: PG INET, MySQL VARCHAR(45), SQLite TEXT.
  SEM_IP = 8;
  // String carrier. Storage: PG TSVECTOR, others deferred (iter-2+).
  SEM_TSEARCH = 9;

  // Numeric carriers.
  SEM_NUMBER = 10;
  SEM_ID = 11;
  SEM_COUNTER = 12;
  SEM_MONEY = 13;
  SEM_PERCENTAGE = 14;
  SEM_RATIO = 15;

  // Arbitrary-precision decimal (carrier: string).
  SEM_DECIMAL = 16;

  // Temporal.
  SEM_DATE = 20;
  SEM_TIME = 21;
  SEM_DATETIME = 22;
  SEM_INTERVAL = 30;

  // Explicit "compiler picks storage per dialect" on map/repeated
  // carriers. Same as leaving type unset on those carriers but
  // written deliberately. Not valid on scalar carriers.
  SEM_AUTO = 40;

  // Enumerated value. Valid on string (PG → CREATE TYPE AS ENUM),
  // int32 / int64 (INTEGER/BIGINT + CHECK IN numbers), and auto-
  // inferred on bare proto-enum fields (int32 + CHECK IN numbers).
  // Choices FQN resolves to value names (string path) or paired
  // (name, number) pairs (int / auto-inferred paths).
  SEM_ENUM = 50;
}

// FKAction — resolved ON DELETE behaviour. Populated from
// (w17.db.column).deletion_rule with inference from (w17.field).null
// when the rule is unspecified. Emitters map to the dialect-native
// clause (PG: CASCADE / SET NULL / RESTRICT / SET DEFAULT).
enum FKAction {
  FK_ACTION_UNSPECIFIED = 0;
  FK_ACTION_CASCADE = 1;
  FK_ACTION_SET_NULL = 2;
  FK_ACTION_RESTRICT = 3;      // DeletionRule.BLOCK — parent delete refused
  FK_ACTION_SET_DEFAULT = 4;   // DeletionRule.RESET  — child FK reverts to default_*
}

// AutoKind — the non-literal branches of (w17.field).default.
enum AutoKind {
  AUTO_UNSPECIFIED = 0;
  AUTO_NOW = 1;
  AUTO_UUID_V4 = 10;
  AUTO_UUID_V7 = 11;
  AUTO_EMPTY_JSON_ARRAY  = 20;
  AUTO_EMPTY_JSON_OBJECT = 21;
  AUTO_TRUE = 30;
  AUTO_FALSE = 31;
  AUTO_IDENTITY = 40;
}

// RegexSource — whether a RegexCheck came from the author's `pattern` or was
// derived from the semantic type (SLUG/UUID/EMAIL/URL). Emitters treat both
// identically; kept for --verbose labeling.
enum RegexSource {
  REGEX_SOURCE_UNSPECIFIED = 0;
  REGEX_FROM_TYPE = 1;
  REGEX_FROM_PATTERN = 2;
}

// DbType mirrors (w17.db.column).db_type 1:1 — see proto/w17/db.proto for
// the authoring-surface documentation per value. Kept as a separate IR
// enum so the IR stays self-contained and doesn't import the authoring
// vocabulary.
enum DbType {
  DB_TYPE_UNSPECIFIED = 0;
  DBT_TEXT = 1;
  DBT_VARCHAR = 2;
  DBT_CITEXT = 3;
  DBT_JSON = 10;
  DBT_JSONB = 11;
  DBT_HSTORE = 20;
  DBT_INET = 30;
  DBT_CIDR = 31;
  DBT_MACADDR = 32;
  DBT_TSVECTOR = 40;
  DBT_UUID = 50;
  DBT_SMALLINT = 60;
  DBT_INTEGER = 61;
  DBT_BIGINT = 62;
  DBT_REAL = 63;
  DBT_DOUBLE_PRECISION = 64;
  DBT_NUMERIC = 65;
  DBT_DATE = 70;
  DBT_TIME = 71;
  DBT_TIMESTAMP = 72;
  DBT_TIMESTAMPTZ = 73;
  DBT_INTERVAL = 74;
  DBT_BYTEA = 80;
  DBT_BLOB = 81;
  DBT_BOOLEAN = 90;
}
