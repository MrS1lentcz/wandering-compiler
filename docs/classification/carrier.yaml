# D28.2 — carrier × carrier transition classification.
#
# One entry per non-trivial (from != to) transition the differ may
# encounter on an AlterColumn that kept its proto field number. A
# carrier change with a renumbered field degenerates to
# DropColumn + AddColumn and bypasses this matrix entirely.
#
# Template placeholders (Go text/template):
#   {{.Table}} — resolved table name (incl. namespace qualifier)
#   {{.Col}}   — column name (post-rename if applicable)
#
# Strategies: see strategies.yaml. Rank-ordered:
#   SAFE < LOSSLESS_USING < NEEDS_CONFIRM < DROP_AND_CREATE < CUSTOM_MIGRATION
#
# Author overrides: author may relax to a higher-rank strategy via
# --decide <col>=<strategy>. Classifier never auto-emits higher
# than the cell's default.

carriers: [BOOL, STRING, INT32, INT64, DOUBLE, TIMESTAMP, DURATION, BYTES, MAP, LIST, MESSAGE]

cells:
  # ── From BOOL ─────────────────────────────────────────────────
  - from: BOOL
    to: STRING
    strategy: LOSSLESS_USING
    using: "{{.Col}}::text"
    rationale: "PG emits 't'/'f'; deterministic, reversible via col::boolean."
  - from: BOOL
    to: INT32
    strategy: LOSSLESS_USING
    using: "{{.Col}}::int"
    rationale: "PG maps false→0, true→1; reversible via <> 0."
  - from: BOOL
    to: INT64
    strategy: LOSSLESS_USING
    using: "({{.Col}}::int)::bigint"
    rationale: "Same as BOOL→INT32; PG has no direct bool→bigint cast — chain through int."
  - from: BOOL
    to: DOUBLE
    strategy: LOSSLESS_USING
    using: "{{.Col}}::int::double precision"
    rationale: "Chain bool→int→double; lossless both directions."
  - from: BOOL
    to: TIMESTAMP
    strategy: CUSTOM_MIGRATION
    rationale: "No meaningful cast exists; author writes mapping SQL (e.g. 'true → now(), false → epoch') or opts into DROP_AND_CREATE via --decide."
  - from: BOOL
    to: DURATION
    strategy: CUSTOM_MIGRATION
    rationale: "Same as BOOL→TIMESTAMP: author owns mapping or opts into drop."
  - from: BOOL
    to: BYTES
    strategy: NEEDS_CONFIRM
    using: "decode({{.Col}}::text, '{{.Project.Encoding}}')"
    rationale: "Canonical 't'/'f' text bytes under project encoding (w17.yaml). No per-column encoding guess."

  # ── From STRING ──────────────────────────────────────────────
  - from: STRING
    to: BOOL
    strategy: NEEDS_CONFIRM
    using: "{{.Col}}::boolean"
    check_sql: "SELECT count(*) FROM {{.Table}} WHERE {{.Col}} NOT IN ('0', '1') LIMIT 1"
    rationale: "Strict compatibility: only '0' and '1' accepted. Other boolean-like strings ('true', 'yes', 't') — author converts via DQL/SQL first; compiler does no semantic guess."
  - from: STRING
    to: INT32
    strategy: NEEDS_CONFIRM
    using: "{{.Col}}::int"
    check_sql: "SELECT count(*) FROM {{.Table}} WHERE {{.Col}} !~ '^-?[0-9]+$' OR {{.Col}}::bigint > 2147483647 OR {{.Col}}::bigint < -2147483648 LIMIT 1"
    rationale: "Parse risk + INT32 overflow risk."
  - from: STRING
    to: INT64
    strategy: NEEDS_CONFIRM
    using: "{{.Col}}::bigint"
    check_sql: "SELECT count(*) FROM {{.Table}} WHERE {{.Col}} !~ '^-?[0-9]+$' LIMIT 1"
    rationale: "Parse risk only; INT64 range dwarfs typical string-numeric values."
  - from: STRING
    to: DOUBLE
    strategy: NEEDS_CONFIRM
    using: "{{.Col}}::double precision"
    check_sql: "SELECT count(*) FROM {{.Table}} WHERE {{.Col}} !~ '^-?[0-9]+(\\.[0-9]+)?([eE][-+]?[0-9]+)?$' LIMIT 1"
    rationale: "Parse risk."
  - from: STRING
    to: TIMESTAMP
    strategy: NEEDS_CONFIRM
    using: "{{.Col}}::timestamptz"
    check_sql: "SELECT count(*) FROM {{.Table}} WHERE {{.Col}} IS NOT NULL AND {{.Col}} !~ '^[0-9]{4}-[0-9]{2}-[0-9]{2}[T ][0-9]{2}:[0-9]{2}:[0-9]{2}(\\.[0-9]+)?(Z|[+-][0-9]{2}:[0-9]{2})?$' LIMIT 1"
    rationale: "Strict ISO-8601 date+time-of-day required. Other timestamp-looking strings — author normalises via DQL first."
  - from: STRING
    to: DURATION
    strategy: NEEDS_CONFIRM
    using: "{{.Col}}::interval"
    check_sql: "SELECT count(*) FROM {{.Table}} WHERE {{.Col}} IS NOT NULL AND {{.Col}} !~ '^P([0-9]+Y)?([0-9]+M)?([0-9]+D)?(T([0-9]+H)?([0-9]+M)?([0-9]+S)?)?$' LIMIT 1"
    rationale: "Strict ISO-8601 duration form required ('P1Y2M3DT4H5M6S'). PG's native '1 day 02:03:04' form — author normalises first."
  - from: STRING
    to: BYTES
    strategy: NEEDS_CONFIRM
    using: "decode({{.Col}}, '{{.Project.Encoding}}')"
    rationale: "Encoding from project config (w17.yaml Project.Encoding). Check.sql synthesised per-encoding by classifier (hex → [0-9a-fA-F], utf8 → convert_from round-trip, escape → always passes)."

  # ── From INT32 ───────────────────────────────────────────────
  - from: INT32
    to: BOOL
    strategy: NEEDS_CONFIRM
    using: "{{.Col}}::boolean"
    check_sql: "SELECT count(*) FROM {{.Table}} WHERE {{.Col}} NOT IN (0, 1) LIMIT 1"
    rationale: "Strict compatibility: only 0 and 1 accepted. Sentinel values (-1 for 'unknown', 2/3/… for multi-state) — author writes DQL/CUSTOM_MIGRATION; compiler does no nonzero=true remap."
  - from: INT32
    to: STRING
    strategy: LOSSLESS_USING
    using: "{{.Col}}::text"
    rationale: "Canonical decimal string; reversible."
  - from: INT32
    to: INT64
    strategy: SAFE
    rationale: "Strict widen; no USING needed."
  - from: INT32
    to: DOUBLE
    strategy: LOSSLESS_USING
    using: "{{.Col}}::double precision"
    rationale: "INT32 max (~2.1e9) << 2^53; fits exactly in double."
  - from: INT32
    to: TIMESTAMP
    strategy: CUSTOM_MIGRATION
    rationale: "Epoch unit (s / ms / μs / ns) is author's semantic choice; compiler doesn't guess. Author writes `to_timestamp(col * <factor>)` or equivalent."
  - from: INT32
    to: DURATION
    strategy: CUSTOM_MIGRATION
    rationale: "Unit ambiguity; author writes `make_interval(secs => col)` / `(col * INTERVAL '1 ms')` per chosen unit."
  - from: INT32
    to: BYTES
    strategy: CUSTOM_MIGRATION
    rationale: "Endianness + byte-count (4-byte BE default exists, but LE / compact varint are valid too); author writes the encoder."

  # ── From INT64 ───────────────────────────────────────────────
  - from: INT64
    to: BOOL
    strategy: NEEDS_CONFIRM
    using: "({{.Col}}::int)::boolean"
    check_sql: "SELECT count(*) FROM {{.Table}} WHERE {{.Col}} NOT IN (0, 1) LIMIT 1"
    rationale: "Same as INT32→BOOL: strict 0/1 compatibility. PG has no direct bigint→bool cast — chain through int (safe after the 0/1 check)."
  - from: INT64
    to: STRING
    strategy: LOSSLESS_USING
    using: "{{.Col}}::text"
    rationale: "Canonical decimal string."
  - from: INT64
    to: INT32
    strategy: NEEDS_CONFIRM
    using: "{{.Col}}::int"
    check_sql: "SELECT count(*) FROM {{.Table}} WHERE {{.Col}} > 2147483647 OR {{.Col}} < -2147483648 LIMIT 1"
    rationale: "Narrow; overflow check."
  - from: INT64
    to: DOUBLE
    strategy: NEEDS_CONFIRM
    using: "{{.Col}}::double precision"
    check_sql: "SELECT count(*) FROM {{.Table}} WHERE abs({{.Col}}) > 9007199254740992 LIMIT 1"
    rationale: "Above 2^53, doubles lose integer precision."
  - from: INT64
    to: TIMESTAMP
    strategy: CUSTOM_MIGRATION
    rationale: "Same as INT32→TIMESTAMP: epoch-unit ambiguity, author writes."
  - from: INT64
    to: DURATION
    strategy: CUSTOM_MIGRATION
    rationale: "Same as INT32→DURATION."
  - from: INT64
    to: BYTES
    strategy: CUSTOM_MIGRATION
    rationale: "Same as INT32→BYTES: endianness + byte-count author-owned."

  # ── From DOUBLE ──────────────────────────────────────────────
  - from: DOUBLE
    to: BOOL
    strategy: NEEDS_CONFIRM
    using: "{{.Col}}::int::boolean"
    check_sql: "SELECT count(*) FROM {{.Table}} WHERE {{.Col}} NOT IN (0, 1) LIMIT 1"
    rationale: "Strict compatibility: only exact 0 or 1 accepted. Floats like 0.5, 2.3, NaN — author converts via DQL first."
  - from: DOUBLE
    to: STRING
    strategy: LOSSLESS_USING
    using: "{{.Col}}::text"
    rationale: "PG emits canonical text form; reversible via col::double."
  - from: DOUBLE
    to: INT32
    strategy: NEEDS_CONFIRM
    using: "{{.Col}}::int"
    check_sql: "SELECT count(*) FROM {{.Table}} WHERE {{.Col}} <> floor({{.Col}}) OR {{.Col}} > 2147483647 OR {{.Col}} < -2147483648 LIMIT 1"
    rationale: "Truncation + overflow."
  - from: DOUBLE
    to: INT64
    strategy: NEEDS_CONFIRM
    using: "{{.Col}}::bigint"
    check_sql: "SELECT count(*) FROM {{.Table}} WHERE {{.Col}} <> floor({{.Col}}) LIMIT 1"
    rationale: "Truncation only (INT64 range covers any finite double)."
  - from: DOUBLE
    to: TIMESTAMP
    strategy: CUSTOM_MIGRATION
    rationale: "Epoch-unit + sub-second precision is author's choice; no default."
  - from: DOUBLE
    to: DURATION
    strategy: CUSTOM_MIGRATION
    rationale: "Sub-second + unit ambiguity; author writes."
  - from: DOUBLE
    to: BYTES
    strategy: CUSTOM_MIGRATION
    rationale: "IEEE 754 wire format, endianness + NaN representation — author writes encoder."

  # ── From TIMESTAMP ───────────────────────────────────────────
  - from: TIMESTAMP
    to: BOOL
    strategy: CUSTOM_MIGRATION
    rationale: "No sensible cast; author writes predicate (e.g. 'col > now() - interval '7d'') or opts into DROP_AND_CREATE."
  - from: TIMESTAMP
    to: STRING
    strategy: LOSSLESS_USING
    using: "{{.Col}}::text"
    rationale: "ISO-8601 canonical; reversible via col::timestamptz."
  - from: TIMESTAMP
    to: INT32
    strategy: CUSTOM_MIGRATION
    rationale: "Epoch unit is author's semantic choice (s / ms / μs); no default. Author writes `extract(epoch from col)::int * <factor>` per chosen unit + overflow handling."
  - from: TIMESTAMP
    to: INT64
    strategy: CUSTOM_MIGRATION
    rationale: "Same as TIMESTAMP→INT32: unit ambiguity, author owns."
  - from: TIMESTAMP
    to: DOUBLE
    strategy: CUSTOM_MIGRATION
    rationale: "Unit + sub-second precision is author's choice."
  - from: TIMESTAMP
    to: DURATION
    strategy: CUSTOM_MIGRATION
    rationale: "Timestamp → interval requires a reference point (interval relative to what?); author writes the SQL that defines the reference."
  - from: TIMESTAMP
    to: BYTES
    strategy: CUSTOM_MIGRATION
    rationale: "Encoding (text serialisation / binary timestamp / epoch-bytes) is author's choice."

  # ── From DURATION ────────────────────────────────────────────
  - from: DURATION
    to: BOOL
    strategy: CUSTOM_MIGRATION
    rationale: "No sensible cast; author writes predicate or opts into DROP_AND_CREATE."
  - from: DURATION
    to: STRING
    strategy: LOSSLESS_USING
    using: "{{.Col}}::text"
    rationale: "Canonical form ('1 day 02:03:04'); reversible."
  - from: DURATION
    to: INT32
    strategy: CUSTOM_MIGRATION
    rationale: "Unit ambiguity + overflow; author owns."
  - from: DURATION
    to: INT64
    strategy: CUSTOM_MIGRATION
    rationale: "Unit ambiguity; author owns."
  - from: DURATION
    to: DOUBLE
    strategy: CUSTOM_MIGRATION
    rationale: "Unit + precision; author owns."
  - from: DURATION
    to: TIMESTAMP
    strategy: CUSTOM_MIGRATION
    rationale: "Interval → timestamp needs a reference point; same as TIMESTAMP→DURATION inverse."
  - from: DURATION
    to: BYTES
    strategy: CUSTOM_MIGRATION
    rationale: "Encoding (text form / binary / seconds-bytes) is author's choice."

  # ── From BYTES ───────────────────────────────────────────────
  - from: BYTES
    to: BOOL
    strategy: CUSTOM_MIGRATION
    rationale: "Byte-level interpretation (first byte? any nonzero byte? specific header?) — author writes predicate."
  - from: BYTES
    to: STRING
    strategy: NEEDS_CONFIRM
    using: "encode({{.Col}}, '{{.Project.Encoding}}')"
    rationale: "Encoding from project config (w17.yaml Project.Encoding: hex / escape / utf8). Check.sql synthesised per-encoding by classifier (utf8 → convert_from round-trip; hex/escape always pass)."
  - from: BYTES
    to: INT32
    strategy: CUSTOM_MIGRATION
    rationale: "Endianness + byte-count interpretation author-owned."
  - from: BYTES
    to: INT64
    strategy: CUSTOM_MIGRATION
    rationale: "Same as BYTES→INT32."
  - from: BYTES
    to: DOUBLE
    strategy: CUSTOM_MIGRATION
    rationale: "IEEE 754 reconstruction; author writes decoder."
  - from: BYTES
    to: TIMESTAMP
    strategy: CUSTOM_MIGRATION
    rationale: "Byte-to-timestamp is format-specific; author writes."
  - from: BYTES
    to: DURATION
    strategy: CUSTOM_MIGRATION
    rationale: "Byte-level interpretation; author-defined."

  # ── Collection carriers — Grid B ─────────────────────────────
  # Per user rule (types must be compatible; no silent coercion):
  # every non-STRING projection from a collection carrier is
  # CUSTOM_MIGRATION by default — the extraction rule is author's
  # semantic choice. Author opts into DROP_AND_CREATE via
  # `--decide col=drop_and_create` if they want fresh start
  # instead of a custom extraction path.

  # MAP → *
  - from: MAP
    to: STRING
    strategy: LOSSLESS_USING
    using: "{{.Col}}::text"
    rationale: "JSONB → canonical text serialisation; reversible via col::jsonb."
  - from: MAP
    to: BOOL
    strategy: CUSTOM_MIGRATION
    rationale: "Single-value projection from a map is author-defined (which key? fold?); compiler doesn't guess."
  - from: MAP
    to: INT32
    strategy: CUSTOM_MIGRATION
    rationale: "Same as MAP→BOOL: projection rule author-owned."
  - from: MAP
    to: INT64
    strategy: CUSTOM_MIGRATION
    rationale: "Same as MAP→BOOL."
  - from: MAP
    to: DOUBLE
    strategy: CUSTOM_MIGRATION
    rationale: "Same as MAP→BOOL."
  - from: MAP
    to: TIMESTAMP
    strategy: CUSTOM_MIGRATION
    rationale: "Same as MAP→BOOL."
  - from: MAP
    to: DURATION
    strategy: CUSTOM_MIGRATION
    rationale: "Same as MAP→BOOL."
  - from: MAP
    to: BYTES
    strategy: CUSTOM_MIGRATION
    rationale: "Same as MAP→BOOL."
  - from: MAP
    to: LIST
    strategy: CUSTOM_MIGRATION
    rationale: "Drops keys; author picks value-extraction order (jsonb_agg with ORDER BY key / custom)."
  - from: MAP
    to: MESSAGE
    strategy: CUSTOM_MIGRATION
    rationale: "Field-by-field extract; author maps keys to message fields."

  # LIST → *
  - from: LIST
    to: STRING
    strategy: LOSSLESS_USING
    using: "{{.Col}}::text"
    rationale: "JSONB array → canonical text."
  - from: LIST
    to: BOOL
    strategy: CUSTOM_MIGRATION
    rationale: "Single-value projection (first? any? all?) is author's choice."
  - from: LIST
    to: INT32
    strategy: CUSTOM_MIGRATION
    rationale: "Same as LIST→BOOL."
  - from: LIST
    to: INT64
    strategy: CUSTOM_MIGRATION
    rationale: "Same."
  - from: LIST
    to: DOUBLE
    strategy: CUSTOM_MIGRATION
    rationale: "Same."
  - from: LIST
    to: TIMESTAMP
    strategy: CUSTOM_MIGRATION
    rationale: "Same."
  - from: LIST
    to: DURATION
    strategy: CUSTOM_MIGRATION
    rationale: "Same."
  - from: LIST
    to: BYTES
    strategy: CUSTOM_MIGRATION
    rationale: "Same."
  - from: LIST
    to: MAP
    strategy: CUSTOM_MIGRATION
    rationale: "Keys must be synthesised; author owns the key scheme (jsonb_object_agg(idx, value) or custom)."
  - from: LIST
    to: MESSAGE
    strategy: CUSTOM_MIGRATION
    rationale: "Index-based field extract; author owns projection."

  # MESSAGE → *
  - from: MESSAGE
    to: STRING
    strategy: LOSSLESS_USING
    using: "{{.Col}}::text"
    rationale: "JSONB object → canonical text. NOTE: bytes-backed MESSAGE (custom_type escape) is opaque; falls through to CUSTOM_MIGRATION per A12."
  - from: MESSAGE
    to: BOOL
    strategy: CUSTOM_MIGRATION
    rationale: "Single-value projection (which field?) is author's choice."
  - from: MESSAGE
    to: INT32
    strategy: CUSTOM_MIGRATION
    rationale: "Same as MESSAGE→BOOL."
  - from: MESSAGE
    to: INT64
    strategy: CUSTOM_MIGRATION
    rationale: "Same."
  - from: MESSAGE
    to: DOUBLE
    strategy: CUSTOM_MIGRATION
    rationale: "Same."
  - from: MESSAGE
    to: TIMESTAMP
    strategy: CUSTOM_MIGRATION
    rationale: "Same."
  - from: MESSAGE
    to: DURATION
    strategy: CUSTOM_MIGRATION
    rationale: "Same."
  - from: MESSAGE
    to: BYTES
    strategy: CUSTOM_MIGRATION
    rationale: "Same."
  - from: MESSAGE
    to: MAP
    strategy: CUSTOM_MIGRATION
    rationale: "Field → (key, value) fold; author owns fold direction."
  - from: MESSAGE
    to: LIST
    strategy: CUSTOM_MIGRATION
    rationale: "Field values in declaration order; author owns projection."

  # scalar → collection (reshape)
  # Wrapping a scalar into a collection is an author-intent choice
  # (single-element list? object with what key?); classifier won't
  # guess. Author supplies the wrap SQL via CUSTOM_MIGRATION, or
  # opts into DROP_AND_CREATE via --decide if data-loss is fine.
  - from: BOOL
    to: MAP
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap SQL (e.g. `jsonb_build_object('value', {{.Col}})`)."
  - from: BOOL
    to: LIST
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap SQL (e.g. `jsonb_build_array({{.Col}})`)."
  - from: BOOL
    to: MESSAGE
    strategy: CUSTOM_MIGRATION
    rationale: "Author picks which field of the message receives the scalar."
  - from: STRING
    to: MAP
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap. If rows are already JSON-text, `{{.Col}}::jsonb` suffices; classifier can't know without inspection."
  - from: STRING
    to: LIST
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap."
  - from: STRING
    to: MESSAGE
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap."
  - from: INT32
    to: MAP
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap."
  - from: INT32
    to: LIST
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap."
  - from: INT32
    to: MESSAGE
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap."
  - from: INT64
    to: MAP
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap."
  - from: INT64
    to: LIST
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap."
  - from: INT64
    to: MESSAGE
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap."
  - from: DOUBLE
    to: MAP
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap."
  - from: DOUBLE
    to: LIST
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap."
  - from: DOUBLE
    to: MESSAGE
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap."
  - from: TIMESTAMP
    to: MAP
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap."
  - from: TIMESTAMP
    to: LIST
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap."
  - from: TIMESTAMP
    to: MESSAGE
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap."
  - from: DURATION
    to: MAP
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap."
  - from: DURATION
    to: LIST
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap."
  - from: DURATION
    to: MESSAGE
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap."
  - from: BYTES
    to: MAP
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap."
  - from: BYTES
    to: LIST
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap."
  - from: BYTES
    to: MESSAGE
    strategy: CUSTOM_MIGRATION
    rationale: "Author writes wrap."
